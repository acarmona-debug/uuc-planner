<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{

  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;--orange:#f97316;--purple:#a855f7;
  --radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,.4);--tr:.18s ease;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden;}
#root{height:100%;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
.flex{display:flex;}.col{flex-direction:column;}.wrap{flex-wrap:wrap;}
.center{align-items:center;}.between{justify-content:space-between;}.end{justify-content:flex-end;}
.grow{flex:1;}.gap2{gap:2px;}.gap4{gap:4px;}.gap6{gap:6px;}.gap8{gap:8px;}.gap12{gap:12px;}.gap16{gap:16px;}
.t-xs{font-size:11px;}.t-sm{font-size:12px;}.t-lg{font-size:16px;}.t-xl{font-size:20px;}.t-2xl{font-size:24px;}
.bold{font-weight:600;}.muted{color:var(--text2);}.accent{color:var(--accent);}
.red{color:var(--red);}.green{color:var(--green);}.blue{color:var(--blue);}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
button{cursor:pointer;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;transition:var(--tr);display:inline-flex;align-items:center;gap:6px;}
button:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#000;padding:8px 16px;}
.btn-primary:hover:not(:disabled){background:var(--accent2);}
.btn-secondary{background:var(--bg3);color:var(--text);padding:8px 16px;}
.btn-secondary:hover:not(:disabled){background:var(--border);}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px;}
.btn-ghost:hover:not(:disabled){background:var(--bg3);color:var(--text);}
.btn-danger{background:var(--red);color:#fff;padding:8px 16px;}
.btn-danger:hover:not(:disabled){background:#dc2626;}
.btn-icon{background:transparent;color:var(--text2);padding:5px;border-radius:var(--radius);}
.btn-icon:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;padding:8px 10px;width:100%;outline:none;transition:border-color var(--tr);font-family:inherit;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--text2);}
select option{background:var(--bg2);}
textarea{resize:vertical;min-height:72px;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.5);}
label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;}
.field{display:flex;flex-direction:column;gap:4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.card-sm{padding:12px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:720px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:600;}
.modal-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:var(--radius);line-height:1;}
.modal-close:hover{background:var(--bg3);color:var(--text);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-yellow{background:rgba(234,179,8,.15);color:#fbbf24;}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa;}
.badge-green{background:rgba(34,197,94,.15);color:#4ade80;}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;}
.badge-gray{background:rgba(71,85,105,.4);color:var(--text2);}
.badge-purple{background:rgba(168,85,247,.15);color:#c084fc;}
#toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 20px;font-size:13px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:slideUp .2s ease;min-width:260px;max-width:420px;}
.toast-undo button{background:var(--accent);color:#000;padding:4px 10px;font-size:12px;border-radius:6px;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.spinner{width:20px;height:20px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
.spinner-lg{width:36px;height:36px;border-width:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.tag{display:inline-flex;align-items:center;background:rgba(71,85,105,.5);border-radius:100px;padding:1px 7px;font-size:10px;color:var(--text2);gap:4px;}
.tag-remove{cursor:pointer;opacity:.6;}.tag-remove:hover{opacity:1;}
.app-shell{display:flex;flex-direction:column;height:100vh;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px;}
.topbar-logo{font-size:18px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;}
.topbar-nav{display:flex;align-items:center;gap:4px;}
.nav-tab{background:transparent;border:none;color:var(--text2);padding:6px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:var(--tr);}
.nav-tab:hover{background:var(--bg3);color:var(--text);}
.nav-tab.active{background:var(--bg3);color:var(--accent);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;}
.main-content{flex:1;overflow-y:auto;padding:20px;}
/* TASK ROW */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-row{background:var(--bg2);border:1px solid var(--border);border-left:4px solid transparent;border-radius:var(--radius-lg);padding:12px 14px 12px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color var(--tr),transform var(--tr);}
.task-row:hover{border-color:var(--accent);border-left-color:inherit;transform:translateX(2px);}
.task-row-body{flex:1;min-width:0;}
.task-row-title{font-size:14px;font-weight:600;line-height:1.3;}
.task-row-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;}
.task-row-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
/* KANBAN */
.board-columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;align-items:start;}
.board-col{display:flex;flex-direction:column;gap:8px;}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:6px 4px;}
.col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;}
.col-count{background:var(--bg3);color:var(--text2);border-radius:100px;padding:1px 8px;font-size:11px;}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:border-color var(--tr),transform var(--tr);position:relative;overflow:hidden;}
.task-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.card-stripe{height:3px;position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
/* PIN PULSE */
@keyframes borderPulse{0%{box-shadow:0 0 0 0 rgba(234,179,8,.7);}50%{box-shadow:0 0 0 7px rgba(234,179,8,0);}100%{box-shadow:0 0 0 0 rgba(234,179,8,0);}}
.task-pinned{border-color:rgba(234,179,8,.5)!important;animation:borderPulse 2.2s ease-in-out infinite;}
/* DOTS MENU */
.dots-menu{position:relative;}
.dots-dropdown{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;min-width:160px;z-index:150;box-shadow:var(--shadow);animation:fadeIn .12s ease;}
.dots-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;transition:var(--tr);color:var(--text2);white-space:nowrap;}
.dots-item:hover{background:var(--bg3);color:var(--text);}
.dots-item.danger:hover{background:rgba(239,68,68,.1);color:var(--red);}
/* BOARD HEADER */
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.filter-chip{background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-size:12px;cursor:pointer;transition:var(--tr);color:var(--text2);}
.filter-chip:hover{border-color:var(--accent);color:var(--text);}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(234,179,8,.08);}
.view-toggle{display:flex;background:var(--bg3);border-radius:var(--radius);padding:3px;gap:2px;flex-shrink:0;}
.view-btn{background:transparent;color:var(--text2);padding:5px 10px;font-size:12px;border-radius:6px;}
.view-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
/* PROGRESS */
.progress-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:.3s;}
/* DUE */
.due-ok{color:var(--text2);}.due-soon{color:var(--accent);}.due-overdue{color:var(--red);}
/* DETAIL */
.detail-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.read-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.read-dot.read{background:var(--green);}.read-dot.unread{background:var(--red);}
/* COMMENTS */
.comment-item{display:flex;gap:10px;}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.comment-mention{color:var(--accent);font-weight:600;}
.bitacora-item{display:flex;gap:10px;font-size:12px;color:var(--text2);padding:6px 0;border-bottom:1px solid var(--bg3);}
.bitacora-time{flex-shrink:0;font-family:monospace;font-size:11px;}
.subtask-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);margin-bottom:6px;}
.subtask-item.cancelled{opacity:.5;text-decoration:line-through;}
/* DASHBOARD */
.dash-shell{display:flex;gap:20px;min-height:100%;}
.dash-sidebar{width:220px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;height:fit-content;position:sticky;top:0;}
.dash-group-title{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;padding:10px 4px 4px;}
.metric-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:var(--radius);cursor:pointer;transition:var(--tr);gap:8px;}
.metric-toggle:hover{background:var(--bg3);}
.metric-toggle span{font-size:12px;flex:1;}
.tog{width:30px;height:16px;background:var(--bg3);border-radius:8px;position:relative;transition:var(--tr);flex-shrink:0;}
.tog.on{background:var(--accent);}
.tog::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:var(--tr);}
.tog.on::after{left:16px;}
.dash-main{flex:1;}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.metric-wide{grid-column:span 2;}
.metric-value{font-size:34px;font-weight:700;line-height:1;}
.metric-label{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.metric-sub{font-size:11px;color:var(--text2);margin-top:6px;}
.bar-chart{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:11px;color:var(--text2);width:76px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:.4s;}
.bar-val{font-size:11px;color:var(--text2);width:28px;text-align:right;flex-shrink:0;}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;background:var(--bg3);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;position:relative;cursor:pointer;transition:var(--tr);}
.cal-day:hover{background:var(--border);}
.cal-day.today{border:1px solid var(--accent);}
.cal-day.has-tasks{background:rgba(59,130,246,.15);}
.cal-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;position:absolute;bottom:3px;}
/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:400px;}
.onboarding-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.maintenance-screen{position:fixed;inset:0;background:rgba(15,23,42,.97);display:flex;align-items:center;justify-content:center;z-index:600;flex-direction:column;gap:16px;text-align:center;padding:20px;}
.announcement-banner{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.fade-in{animation:fadeIn .2s ease;}
@media(max-width:640px){.topbar-nav .nav-tab span{display:none;}.board-columns{grid-template-columns:1fr;}.modal{padding:16px;}.dash-sidebar{display:none;}}
</style>

<script type="text/babel">

const fmt=d=>{if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"2-digit"});};
const fmtFull=d=>{if(!d)return"";return new Date(d).toLocaleString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});};
const fmtHrs=h=>{if(h===null||h===undefined)return"—";if(h<1)return`${Math.round(h*60)}min`;if(h<24)return`${Math.round(h)}h`;return`${Math.round(h/24)}d`;};

let _setToasts=null;

      else if(mode==="register"){if(!email.endsWith("@"+DOMAIN))throw new Error(`Solo cuentas @${DOMAIN}`);const{error}=await sb.auth.signUp({email,password:pass});if(error)throw error;setOk("Revisa tu correo.");setMode("login");}

  return(

function TaskDetailModal({task,profile,allProfiles,onClose,onSaved,onEdit,onShare}){
  const[tab,setTab]=useState("detail");
  const[comments,setComments]=useState([]);
  const[bitacora,setBitacora]=useState([]);
  const[subtasks,setSubtasks]=useState([]);
  const[newCmt,setNewCmt]=useState("");
  const[loadingCmt,setLoadingCmt]=useState(false);
  const[confirm,setConfirm]=useState(null);
  const isOwner=task.owner_id===profile.id,isAdmin=profile.role==="admin",isGer=profile.role==="gerente"||isAdmin,canEdit=isOwner||isAdmin;

  useEffect(()=>{
    if(!isOwner)sb.from("tasks").update({read_by_assignee:true}).eq("id",task.id).then(()=>{});
    sb.from("comments").select("*").eq("task_id",task.id).order("created_at").then(({data})=>setComments(data||[]));
    sb.from("bitacora").select("*").eq("task_id",task.id).order("created_at",{ascending:false}).then(({data})=>setBitacora(data||[]));
    sb.from("tasks").select("*").eq("parent_id",task.id).then(({data})=>setSubtasks(data||[]));
    const ch=sb.channel("cmt-"+task.id).on("postgres_changes",{event:"INSERT",schema:"public",table:"comments",filter:`task_id=eq.${task.id}`},p=>setComments(prev=>[...prev,p.new])).subscribe();
    return()=>sb.removeChannel(ch);
  },[task.id]);

  const sendCmt=async()=>{
    if(!newCmt.trim())return;setLoadingCmt(true);
    const text=newCmt.trim();
    await sb.from("comments").insert({task_id:task.id,user_id:profile.id,content:text});
    setNewCmt("");
    const m=[...text.matchAll(/@(\w+)/g)].map(x=>x[1].toLowerCase());
    for(const n of m){const t=Object.values(allProfiles).find(p=>p.nombre?.toLowerCase()===n||p.apellido?.toLowerCase()===n);if(t?.telegram_chat_id)await tgSend(t.telegram_chat_id,`💬 Mencionado\n${task.folio}: "${text}"`);}
    setLoadingCmt(false);
  };

  const applyStatus=async ns=>{
    setConfirm(null);
    const u={status:ns};
    if(ns==="en_curso"&&!task.started_at)u.started_at=new Date().toISOString();
    if(ns==="lista")u.completed_at=new Date().toISOString();
    const{error}=await sb.from("tasks").update(u).eq("id",task.id);
    if(error){toast(error.message,"error");return;}
    await sb.from("bitacora").insert({task_id:task.id,user_id:profile.id,action:"→",detail:STATUS[ns]?.label});
    if(task.parent_id){const{data:p}=await sb.from("tasks").select("owner_id,folio,title").eq("id",task.parent_id).single();if(p){const po=allProfiles[p.owner_id];if(po?.telegram_chat_id)await tgSend(po.telegram_chat_id,`📊 Subtarea: ${task.title}\n→ ${STATUS[ns]?.label}`);}}
    toast(`→ ${STATUS[ns]?.label}`,"success");onSaved();
  };

  const handleAction=async opt=>{
    if(opt==="archivar"){await sb.from("tasks").update({archived:true}).eq("id",task.id);toast("Archivada","success");onSaved();onClose();return;}
    if(opt==="desarchivar"){await sb.from("tasks").update({archived:false}).eq("id",task.id);toast("Desarchivada","success");onSaved();onClose();return;}
    if(task.block_on_subtasks&&opt==="lista"){const p=subtasks.filter(s=>s.status!=="lista"&&s.status!=="descartada");if(p.length){setConfirm({ns:opt,warn:`⚠️ ${p.length} subtarea(s) incompleta(s). ¿Avanzar?`});return;}}
    await applyStatus(opt);
  };

  const deleteTask=async()=>{
    if(!canEdit)return;const copy={...task};
    await sb.from("tasks").delete().eq("id",task.id);
    onSaved();onClose();
    toast("Eliminada","info",async()=>{await sb.from("tasks").insert({...copy,id:undefined});onSaved();toast("Restaurada","success");});
  };

  const ns=NEXT[task.status];
  const owner=allProfiles[task.owner_id];
  const dotsOpts=task.archived?["desarchivar"]:DOTS_OPTS[task.status]||[];

  return(
    <div className="overlay" onClick={onClose}><div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
      <div className="modal-header">
        <div className="flex col gap2 grow">
          <div className="flex center gap8"><span className="muted t-xs" style={{fontFamily:"monospace"}}>{task.folio}</span>{task.is_pinned&&<span>📌</span>}{task.archived&&<span className="badge badge-gray t-xs">Archivada</span>}</div>
          <div className="modal-title">{task.title}</div>
        </div>
        <button className="modal-close" onClick={onClose}>✕</button>
      </div>

      <div className="flex wrap gap8 center" style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
        <span className={`badge ${STATUS[task.status]?.badge}`} style={{fontSize:12,padding:"4px 12px"}}>● {STATUS[task.status]?.label}</span>
        {ns&&!task.archived&&<button className="btn-secondary btn-sm" onClick={()=>handleAction(ns)}>→ {STATUS[ns]?.label}</button>}
        <div style={{marginLeft:"auto"}} className="flex gap6 center wrap">
          <a href={gcalUrl(task)} target="_blank" rel="noreferrer" className="btn-ghost btn-sm" style={{textDecoration:"none"}}>📅 Google Cal</a>
          {canEdit&&<button className="btn-ghost btn-sm" onClick={()=>{onClose();onEdit(task);}}>✏️</button>}
          <button className="btn-ghost btn-sm" onClick={()=>{onClose();onShare(task);}}>↗️</button>
          {canEdit&&<button className="btn-ghost btn-sm red" onClick={deleteTask}>🗑</button>}
          {dotsOpts.length>0&&(
            <select style={{maxWidth:130,padding:"5px 8px",fontSize:12,cursor:"pointer"}} onChange={e=>{if(e.target.value){handleAction(e.target.value);e.target.value="";}}}>
              <option value="">⋮ Más</option>
              {dotsOpts.map(o=><option key={o} value={o}>{o==="archivar"?"📦 Archivar":o==="desarchivar"?"📤 Desarchivar":STATUS[o]?`→ ${STATUS[o].label}`:o}</option>)}
            </select>
          )}
        </div>
      </div>

      {confirm&&<div className="card card-sm" style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",marginBottom:12}}><div style={{marginBottom:8}}>{confirm.warn}</div><div className="flex gap8"><button className="btn-danger btn-sm" onClick={()=>applyStatus(confirm.ns)}>Avanzar</button><button className="btn-secondary btn-sm" onClick={()=>setConfirm(null)}>Cancelar</button></div></div>}

      <div className="flex gap4" style={{borderBottom:"1px solid var(--border)",marginBottom:16}}>
        {["detail","comments","bitacora"].map(t=><button key={t} className={`nav-tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{t==="detail"?"📋 Detalle":t==="comments"?`💬 (${comments.length})`:`📜 (${bitacora.length})`}</button>)}
      </div>

      {tab==="detail"&&(
        <div className="flex col gap16">
          <div className="flex gap16 wrap">
            <div className="grow"><div className="detail-label">Descripción</div><div style={{whiteSpace:"pre-wrap",lineHeight:1.6}}>{task.description||<span className="muted">Sin descripción</span>}</div></div>
            <div className="flex col gap10" style={{minWidth:180}}>
              <div><div className="detail-label">Dueño</div><div className="flex center gap8"><div className="avatar" style={{width:22,height:22,fontSize:9}}>{initials(owner)}</div><span className="t-sm">{owner?.nombre} {owner?.apellido}</span></div></div>
              {task.due_date&&<div><div className="detail-label">Fecha límite</div><div className={`t-sm ${dueCls(task.due_date)}`}>📅 {fmt(task.due_date)}</div></div>}
              {task.category&&<div><div className="detail-label">Categoría</div><span className="badge badge-gray">{task.category}</span></div>}
              {(task.tags||[]).length>0&&<div><div className="detail-label">Tags</div><div className="flex wrap gap4">{task.tags.map(t=><span key={t} className="tag">#{t}</span>)}</div></div>}
              {isGer&&task.started_at&&<div><div className="detail-label">Inicio</div><div className="t-xs muted">{fmtFull(task.started_at)}</div></div>}
              {isGer&&task.completed_at&&<div><div className="detail-label">Completada</div><div className="t-xs muted">{fmtFull(task.completed_at)}</div></div>}
            </div>
          </div>
          {subtasks.length>0&&<div><div className="detail-label" style={{marginBottom:8}}>Subtareas ({subtasks.length})</div>{subtasks.map(st=>{const stO=allProfiles[st.owner_id];return(<div key={st.id} className={`subtask-item ${st.status==="descartada"?"cancelled":""}`}><div className="status-dot" style={{background:sColor(st.status)}}/><div className="grow"><div className="t-sm bold">{st.title}</div><div className="flex gap6 center t-xs muted"><span>{stO?.nombre}</span>{st.due_date&&<span className={dueCls(st.due_date)}>{fmt(st.due_date)}</span>}<span className={`badge ${STATUS[st.status]?.badge}`} style={{fontSize:10}}>{STATUS[st.status]?.label}</span></div></div>{isGer&&st.status!=="descartada"&&st.status!=="lista"&&<button className="btn-icon t-xs" onClick={async()=>{await sb.from("tasks").update({status:"descartada"}).eq("id",st.id);setSubtasks(p=>p.map(s=>s.id===st.id?{...s,status:"descartada"}:s));toast("Cancelada","success");onSaved();}}>✕</button>}</div>);})}</div>}
        </div>
      )}

      {tab==="comments"&&(
        <div className="flex col gap16">
          <div className="flex col gap12">
            {comments.length===0&&<div className="muted t-sm">Sin comentarios.</div>}
            {comments.map(c=>{const cp=allProfiles[c.user_id];return(<div key={c.id} className="comment-item"><div className="comment-avatar">{initials(cp)}</div><div><div className="flex center gap8 t-sm" style={{marginBottom:2}}><span className="bold">{cp?.nombre}</span><span className="muted t-xs">{fmtFull(c.created_at)}</span></div><div style={{fontSize:13,lineHeight:1.5}}>{c.content.split(/(@\w+)/g).map((p,i)=>p.startsWith("@")?<span key={i} className="comment-mention">{p}</span>:p)}</div></div></div>);})}
          </div>
          <div><textarea value={newCmt} onChange={e=>setNewCmt(e.target.value)} placeholder="Comentario... @menciona" onKeyDown={e=>{if(e.key==="Enter"&&e.ctrlKey)sendCmt();}} style={{minHeight:56}}/><div className="flex end gap8" style={{marginTop:6}}><span className="muted t-xs">Ctrl+Enter</span><button className="btn-primary btn-sm" onClick={sendCmt} disabled={loadingCmt||!newCmt.trim()}>{loadingCmt?<span className="spinner"/>:"Enviar"}</button></div></div>
        </div>
      )}

      {tab==="bitacora"&&(
        <div>{bitacora.length===0&&<div className="muted t-sm">Sin registros.</div>}{bitacora.map(b=>{const bp=allProfiles[b.user_id];return(<div key={b.id} className="bitacora-item"><span className="bitacora-time">{fmtFull(b.created_at)}</span><span className="flex center gap4"><div className="avatar" style={{width:16,height:16,fontSize:7}}>{initials(bp)}</div><span className="bold">{bp?.nombre}</span><span>{b.action}</span>{b.detail&&<span className="accent">"{b.detail}"</span>}</span></div>);})}</div>
      )}
    </div></div>
  );
}

function AnnouncementsModal({profile,allProfiles,onClose}){
  const[msg,setMsg]=useState("");
  const[loading,setLoading]=useState(false);
  const canSend=profile.role==="admin"||profile.role==="gerente";
  const send=async()=>{
    if(!msg.trim())return;setLoading(true);
    await sb.from("announcements").insert({content:msg,active:true,created_by:profile.id});
    const myR=ROLE_RANK[profile.role]||1;
    const recipients=Object.values(allProfiles).filter(p=>{if(p.id===profile.id)return false;if(profile.role==="admin")return true;if(profile.role==="gerente")return(ROLE_RANK[p.role]||1)<myR;return false;});
    for(const r of recipients)if(r.telegram_chat_id)await tgSend(r.telegram_chat_id,`📢 <b>Anuncio de ${profile.nombre}</b>\n\n${msg}`);
    toast(`Enviado a ${recipients.length} personas`,"success");setMsg("");setLoading(false);
  };
  return(
    <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-header"><span className="modal-title">📢 Anuncios</span><button className="modal-close" onClick={onClose}>✕</button></div>
      {canSend?(
        <div className="flex col gap12">
          <div style={{background:"rgba(234,179,8,.08)",border:"1px solid rgba(234,179,8,.2)",borderRadius:"var(--radius)",padding:"8px 12px"}} className="t-xs muted">{profile.role==="admin"?"→ Todos los usuarios":"→ Tus subordinados"}</div>
          <div className="field"><label>Mensaje</label><textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Escribe tu anuncio..." style={{minHeight:100}}/></div>
          <div className="flex gap8 end"><button className="btn-secondary" onClick={onClose}>Cancelar</button><button className="btn-primary" onClick={send} disabled={loading||!msg.trim()}>{loading?<span className="spinner"/>:"📤 Enviar"}</button></div>
        </div>
      ):<div className="muted t-sm">Sin permisos.</div>}
    </div></div>
  );
}

/* DASHBOARD */
const ALL_METRICS=[
  {id:"activas",label:"Activas",g:"Carga"},{id:"en_curso",label:"En curso",g:"Carga"},
  {id:"vencidas",label:"Vencidas",g:"Carga"},{id:"bloqueadas",label:"Bloqueadas",g:"Carga"},
  {id:"completadas",label:"Completadas",g:"Volumen"},{id:"total",label:"Total",g:"Volumen"},
  {id:"esta_semana",label:"Esta semana",g:"Volumen"},{id:"por_categoria",label:"Por categoría",g:"Volumen"},
  {id:"por_persona",label:"Por persona",g:"Volumen"},{id:"por_estado",label:"Por estado",g:"Volumen"},
  {id:"tiempo_prom",label:"T. promedio",g:"Velocidad"},{id:"mas_rapido",label:"Más rápido",g:"Velocidad"},
  {id:"mas_lento",label:"Más lento",g:"Velocidad"},{id:"completadas_hoy",label:"Hoy",g:"Velocidad"},
  {id:"tasa_exito",label:"Tasa éxito",g:"Calidad"},{id:"sin_fecha",label:"Sin fecha",g:"Calidad"},
  {id:"replaneadas",label:"Replaneadas",g:"Calidad"},{id:"archivadas",label:"Archivadas",g:"Calidad"},
  {id:"carga_max",label:"Mayor carga",g:"Personas"},{id:"mas_completa",label:"Más completa",g:"Personas"},
  {id:"con_vencidas",label:"Con vencidas",g:"Personas"},
];
const DEFAULT_ACTIVE=["activas","en_curso","vencidas","completadas","tasa_exito","por_persona","tiempo_prom"];

function DashboardView({tasks,profile,allProfiles}){
  const isGer=profile.role==="gerente"||profile.role==="admin";
  const[active,setActive]=useState(()=>{try{const s=localStorage.getItem("dash-m");return s?JSON.parse(s):DEFAULT_ACTIVE;}catch{return DEFAULT_ACTIVE;}});
  useEffect(()=>{try{localStorage.setItem("dash-m",JSON.stringify(active));}catch{}},[active]);
  const tog=id=>setActive(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  useEffect(()=>{
    if(!isGer)return;
    const now=new Date();
    if(now.getDay()===6&&now.getHours()>=14){
      const today=now.toISOString().split("T")[0];
      sb.from("metrics_snapshots").select("id").eq("week_start",today).then(({data})=>{
        if(!data||!data.length){sb.from("metrics_snapshots").insert({week_start:today,data:{total:tasks.length,done:tasks.filter(t=>t.status==="lista").length,overdue:tasks.filter(t=>t.due_date&&dueCls(t.due_date)==="due-overdue").length}}).then(()=>{});}
      });
    }
  },[tasks.length]);

  if(!isGer)return<div className="muted">Solo para gerentes y admins.</div>;

  const now=new Date();
  const weekAgo=new Date(now-7*86400000);
  const T={
    activas:tasks.filter(t=>!t.archived&&t.status!=="lista"&&t.status!=="descartada").length,
    en_curso:tasks.filter(t=>t.status==="en_curso").length,
    vencidas:tasks.filter(t=>t.due_date&&dueCls(t.due_date)==="due-overdue"&&t.status!=="lista").length,
    bloqueadas:tasks.filter(t=>t.status==="bloqueada").length,
    completadas:tasks.filter(t=>t.status==="lista").length,
    total:tasks.length,
    esta_semana:tasks.filter(t=>new Date(t.created_at)>weekAgo).length,
    archivadas:tasks.filter(t=>t.archived).length,
    sin_fecha:tasks.filter(t=>!t.due_date&&t.status!=="lista"&&t.status!=="descartada").length,
    completadas_hoy:tasks.filter(t=>t.completed_at&&new Date(t.completed_at).toDateString()===now.toDateString()).length,
    tasa_exito:tasks.length>0?Math.round(tasks.filter(t=>t.status==="lista").length/tasks.length*100):0,
    replaneadas:tasks.filter(t=>t.is_subtask&&t.status==="descartada").length,
  };
  const byCat={};tasks.forEach(t=>{const c=t.category||"Sin cat";byCat[c]=(byCat[c]||0)+1;});
  const catE=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const bySt={};Object.keys(STATUS).forEach(k=>{bySt[k]=tasks.filter(t=>t.status===k).length;});
  const byP={};
  tasks.forEach(t=>{const u=t.owner_id;if(!byP[u])byP[u]={total:0,done:0,overdue:0,active:0,times:[]};byP[u].total++;if(t.status==="lista"){byP[u].done++;if(t.started_at&&t.completed_at)byP[u].times.push((new Date(t.completed_at)-new Date(t.started_at))/3600000);}if(t.status==="en_curso")byP[u].active++;if(t.due_date&&dueCls(t.due_date)==="due-overdue"&&t.status!=="lista")byP[u].overdue++;});
  const pE=Object.entries(byP).sort((a,b)=>b[1].total-a[1].total);
  const allTimes=tasks.filter(t=>t.started_at&&t.completed_at).map(t=>(new Date(t.completed_at)-new Date(t.started_at))/3600000);
  const avgTime=allTimes.length?allTimes.reduce((a,b)=>a+b,0)/allTimes.length:null;
  const pTimes=pE.filter(([,v])=>v.times.length).map(([id,v])=>({id,avg:v.times.reduce((a,b)=>a+b,0)/v.times.length}));
  const fastest=pTimes.length?pTimes.reduce((a,b)=>a.avg<b.avg?a:b):null;
  const slowest=pTimes.length?pTimes.reduce((a,b)=>a.avg>b.avg?a:b):null;
  const maxLoad=pE.length?pE.reduce((a,b)=>a[1].active>b[1].active?a:b):null;
  const mostDone=pE.length?pE.reduce((a,b)=>a[1].done>b[1].done?a:b):null;
  const withOverdue=pE.filter(([,v])=>v.overdue>0);
  const maxC=catE[0]?.[1]||1,maxP=pE[0]?.[1]?.total||1;
  const p=allProfiles;

  const MC=({value,label,color,sub})=><div className="metric-card"><div className="metric-value" style={{color:color||"var(--text)"}}>{value??0}</div><div className="metric-label">{label}</div>{sub&&<div className="metric-sub">{sub}</div>}</div>;
  const renderM=id=>{
    switch(id){
      case "activas":return<MC key={id} value={T.activas} label="Activas" color="var(--blue)"/>;
      case "en_curso":return<MC key={id} value={T.en_curso} label="En curso" color="var(--blue)"/>;
      case "vencidas":return<MC key={id} value={T.vencidas} label="Vencidas" color="var(--red)"/>;
      case "bloqueadas":return<MC key={id} value={T.bloqueadas} label="Bloqueadas" color="var(--red)"/>;
      case "completadas":return<MC key={id} value={T.completadas} label="Completadas" color="var(--green)"/>;
      case "total":return<MC key={id} value={T.total} label="Total" color="var(--text2)"/>;
      case "esta_semana":return<MC key={id} value={T.esta_semana} label="Esta semana" color="var(--purple)"/>;
      case "archivadas":return<MC key={id} value={T.archivadas} label="Archivadas" color="var(--text2)"/>;
      case "sin_fecha":return<MC key={id} value={T.sin_fecha} label="Sin fecha" color="var(--orange)"/>;
      case "completadas_hoy":return<MC key={id} value={T.completadas_hoy} label="Hoy" color="var(--green)"/>;
      case "tasa_exito":return<MC key={id} value={`${T.tasa_exito}%`} label="Tasa éxito" color={T.tasa_exito>=70?"var(--green)":T.tasa_exito>=40?"var(--accent)":"var(--red)"}/>;
      case "replaneadas":return<MC key={id} value={T.replaneadas} label="Replaneadas" color="var(--orange)"/>;
      case "tiempo_prom":return<MC key={id} value={fmtHrs(avgTime)} label="T. promedio" color="var(--accent)"/>;
      case "mas_rapido":return<MC key={id} value={fastest?p[fastest.id]?.nombre||"—":"—"} label="Más rápido" sub={fastest?fmtHrs(fastest.avg):"—"} color="var(--green)"/>;
      case "mas_lento":return<MC key={id} value={slowest?p[slowest.id]?.nombre||"—":"—"} label="Más lento" sub={slowest?fmtHrs(slowest.avg):"—"} color="var(--red)"/>;
      case "carga_max":return<MC key={id} value={maxLoad?p[maxLoad[0]]?.nombre||"—":"—"} label="Mayor carga" sub={maxLoad?`${maxLoad[1].active} activas`:"—"} color="var(--orange)"/>;
      case "mas_completa":return<MC key={id} value={mostDone?p[mostDone[0]]?.nombre||"—":"—"} label="Más completa" sub={mostDone?`${mostDone[1].done} tareas`:"—"} color="var(--green)"/>;
      case "con_vencidas":return(
        <div key={id} className="metric-card metric-wide">
          <div className="metric-label">Con vencidas</div>
          {withOverdue.length===0?<div className="muted t-sm" style={{marginTop:8}}>Nadie 🎉</div>:
          <div className="bar-chart">{withOverdue.map(([uid,v])=><div key={uid} className="bar-row"><span className="bar-label">{p[uid]?.nombre||"?"}</span><div className="bar-track"><div className="bar-fill" style={{width:`${T.vencidas>0?(v.overdue/T.vencidas)*100:0}%`,background:"var(--red)"}}/></div><span className="bar-val">{v.overdue}</span></div>)}</div>}
        </div>
      );
      case "por_categoria":return(
        <div key={id} className="metric-card metric-wide">
          <div className="metric-label">Por categoría</div>
          <div className="bar-chart">{catE.map(([cat,count])=><div key={cat} className="bar-row"><span className="bar-label">{cat}</span><div className="bar-track"><div className="bar-fill" style={{width:`${(count/maxC)*100}%`,background:"var(--blue)"}}/></div><span className="bar-val">{count}</span></div>)}</div>
        </div>
      );
      case "por_estado":return(
        <div key={id} className="metric-card metric-wide">
          <div className="metric-label">Por estado</div>
          <div className="bar-chart">{Object.entries(bySt).map(([st,c])=><div key={st} className="bar-row"><span className="bar-label">{STATUS[st]?.label}</span><div className="bar-track"><div className="bar-fill" style={{width:`${T.total>0?(c/T.total)*100:0}%`,background:sColor(st)}}/></div><span className="bar-val">{c}</span></div>)}</div>
        </div>
      );
      case "por_persona":return(
        <div key={id} className="metric-card metric-wide">
          <div className="metric-label">Por persona</div>
          <div className="bar-chart">{pE.map(([uid,v])=><div key={uid} className="bar-row"><span className="bar-label">{p[uid]?.nombre||"?"}</span><div className="bar-track"><div className="bar-fill" style={{width:`${(v.total/maxP)*100}%`,background:"var(--blue)"}}/></div><span className="bar-val">{v.done}/{v.total}</span></div>)}</div>
        </div>
      );
      default:return null;
    }
  };

  const groups=[...new Set(ALL_METRICS.map(m=>m.g))];
  return(
    <div className="dash-shell fade-in">
      <div className="dash-sidebar">
        <div className="bold t-sm" style={{marginBottom:8}}>📊 Métricas</div>
        {groups.map(g=>(
          <div key={g}><div className="dash-group-title">{g}</div>
            {ALL_METRICS.filter(m=>m.g===g).map(m=>(
              <div key={m.id} className="metric-toggle" onClick={()=>tog(m.id)}>
                <span>{m.label}</span>
                <div className={`tog ${active.includes(m.id)?"on":""}`}/>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="dash-main"><div className="metrics-grid">{active.map(id=>renderM(id))}</div></div>
    </div>
  );
}

function CalendarView({tasks,onTaskClick}){
  const[month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[sel,setSel]=useState(null);
  const prev=()=>setMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
  const next=()=>setMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});
  const fd=new Date(month.y,month.m,1).getDay(),days=new Date(month.y,month.m+1,0).getDate();
  const today=new Date();
  const byDay={};tasks.forEach(t=>{if(!t.due_date)return;const d=new Date(t.due_date+"T12:00:00");if(d.getFullYear()===month.y&&d.getMonth()===month.m){const k=d.getDate();if(!byDay[k])byDay[k]=[];byDay[k].push(t);}});
  const DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const MNS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Sep","Oct","Nov","Dic"];
  return(
    <div className="flex col gap16 fade-in">
      <div className="flex center between"><div className="t-xl bold">📅 Calendario</div><div className="flex center gap8"><button className="btn-ghost btn-sm" onClick={prev}>‹</button><span className="bold">{MNS[month.m]} {month.y}</span><button className="btn-ghost btn-sm" onClick={next}>›</button></div></div>
      <div className="cal-grid">{DAYS.map(d=><div key={d} className="t-xs muted bold" style={{textAlign:"center",padding:"4px 0"}}>{d}</div>)}</div>
      <div className="cal-grid">
        {Array.from({length:fd}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:days}).map((_,i)=>{const day=i+1,dt=byDay[day]||[],isToday=today.getDate()===day&&today.getMonth()===month.m&&today.getFullYear()===month.y;return(<div key={day} className={`cal-day${isToday?" today":""}${dt.length?" has-tasks":""}`} onClick={()=>setSel(dt.length?day:null)}><span className={isToday?"accent bold":""}>{day}</span>{dt.length>0&&<div className="cal-dot"/>}</div>);})}
      </div>
      {sel&&byDay[sel]&&(
        <div className="card fade-in">
          <div className="bold" style={{marginBottom:10}}>📅 {sel}/{month.m+1}/{month.y}</div>
          <div className="flex col gap6">{byDay[sel].map(t=>(
            <div key={t.id} className="subtask-item" onClick={()=>onTaskClick(t)} style={{cursor:"pointer"}}>
              <div className="status-dot" style={{background:sColor(t.status)}}/>
              <div className="grow"><div className="t-sm bold">{t.title}</div><span className={`badge ${STATUS[t.status]?.badge}`} style={{fontSize:10}}>{STATUS[t.status]?.label}</span></div>
              <a href={gcalUrl(t)} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="btn-ghost btn-xs" style={{textDecoration:"none"}}>📅 Agendar</a>
            </div>
          ))}</div>
        </div>
      )}
    </div>
  );
}

function AnnouncementBanner({text,onDismiss}){
  return(<div className="announcement-banner"><span style={{fontSize:18}}>📢</span><div className="grow"><div className="bold t-sm">Anuncio</div><div className="t-sm">{text}</div></div><button className="btn-icon" onClick={onDismiss}>✕</button></div>);
}

function BoardView({tasks,profile,allProfiles,cfg,onTaskOpen,onNewTask,onSaved}){
  const[view,setView]=useState(()=>{try{return localStorage.getItem("uuc-view")||"list";}catch{return"list";}});
  const[filter,setFilter]=useState("all");
  const[catF,setCatF]=useState("");
  const[search,setSearch]=useState("");
  const[archived,setArchived]=useState(false);
  const[sortBy,setSortBy]=useState("status");
  useEffect(()=>{try{localStorage.setItem("uuc-view",view);}catch{}},[view]);
  const cats=cfg?.categories||DEF_CFG.categories;
  const filtered=useMemo(()=>tasks.filter(t=>{
    if(!archived&&t.archived)return false;if(archived&&!t.archived)return false;
    if(filter==="mine"&&t.owner_id!==profile.id)return false;
    if(filter==="shared"&&t.owner_id===profile.id)return false;
    if(catF&&t.category!==catF)return false;
    if(search){const q=search.toLowerCase();return t.title?.toLowerCase().includes(q)||t.folio?.toLowerCase().includes(q)||(t.tags||[]).some(g=>g.includes(q));}
    return true;
  }),[tasks,filter,catF,search,archived,profile.id]);

  const SO={pendiente:0,en_curso:1,lista:2,bloqueada:3,descartada:4};
  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    if(a.is_pinned&&!b.is_pinned)return -1;if(!a.is_pinned&&b.is_pinned)return 1;
    if(sortBy==="status")return(SO[a.status]||0)-(SO[b.status]||0);
    if(sortBy==="fecha"){if(a.due_date&&b.due_date)return new Date(a.due_date)-new Date(b.due_date);return a.due_date?-1:b.due_date?1:0;}
    if(sortBy==="creacion")return new Date(b.created_at)-new Date(a.created_at);
    return 0;
  }),[filtered,sortBy]);

  const doStatusChange=async(task,ns)=>{
    const u={status:ns};
    if(ns==="en_curso"&&!task.started_at)u.started_at=new Date().toISOString();
    if(ns==="lista")u.completed_at=new Date().toISOString();
    const{error}=await sb.from("tasks").update(u).eq("id",task.id);
    if(!error){await sb.from("bitacora").insert({task_id:task.id,user_id:profile.id,action:"→",detail:STATUS[ns]?.label});toast(`→ ${STATUS[ns]?.label}`,"success");onSaved();}
    else toast(error.message,"error");
  };
  const doAction=async(task,opt)=>{
    if(opt==="archivar"){await sb.from("tasks").update({archived:true}).eq("id",task.id);toast("Archivada","success");onSaved();return;}
    if(opt==="desarchivar"){await sb.from("tasks").update({archived:false}).eq("id",task.id);toast("Desarchivada","success");onSaved();return;}
    await doStatusChange(task,opt);
  };
  const doPin=async task=>{await sb.from("tasks").update({is_pinned:!task.is_pinned}).eq("id",task.id);onSaved();};
  const byStatus=st=>[...filtered.filter(t=>t.status===st)].sort((a,b)=>{if(a.is_pinned&&!b.is_pinned)return -1;if(!a.is_pinned&&b.is_pinned)return 1;return 0;});
  const cp={profile,allProfiles,onOpen:onTaskOpen,onStatusChange:doStatusChange,onPin:doPin,onAction:doAction};

  return(
    <div className="flex col fade-in">
      <div className="board-header">
        <div className="view-toggle">
          <button className={`view-btn ${view==="list"?"active":""}`} onClick={()=>setView("list")}>☰ Lista</button>
          <button className={`view-btn ${view==="kanban"?"active":""}`} onClick={()=>setView("kanban")}>⊞ Kanban</button>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar..." style={{maxWidth:180,minWidth:100}}/>
        <div className="flex gap6 wrap">
          {[["all","Todas"],["mine","Mías"],["shared","Compartidas"]].map(([k,l])=><button key={k} className={`filter-chip ${filter===k?"active":""}`} onClick={()=>setFilter(k)}>{l}</button>)}
          <button className={`filter-chip ${archived?"active":""}`} title="Archivadas" onClick={()=>setArchived(p=>!p)}>📦</button>
        </div>
        <select value={catF} onChange={e=>setCatF(e.target.value)} style={{maxWidth:130}}>
          <option value="">Categoría</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        {view==="list"&&<select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{maxWidth:140}}>
          <option value="status">Estado</option>
          <option value="fecha">Fecha límite</option>
          <option value="creacion">Más reciente</option>
        </select>}
        {!archived&&<button className="btn-primary btn-sm" onClick={onNewTask}>+ Nueva</button>}
      </div>
      {view==="list"&&<div className="task-list">{sorted.length===0&&<div className="muted t-sm" style={{padding:"32px",textAlign:"center"}}>Sin tareas</div>}{sorted.map(t=><TaskRow key={t.id} task={t} {...cp}/>)}</div>}
      {view==="kanban"&&<div className="board-columns">{Object.keys(STATUS).map(st=>{const col=byStatus(st);return(<div key={st} className="board-col"><div className="col-header"><span className="col-title" style={{color:sColor(st)}}>{STATUS[st].label}</span><span className="col-count">{col.length}</span></div>{col.length===0&&<div className="card card-sm muted t-sm" style={{textAlign:"center",borderStyle:"dashed",fontSize:12}}>—</div>}{col.map(t=><TaskCard key={t.id} task={t} {...cp}/>)}</div>);})}</div>}
    </div>
  );
}

function App(){
  const[session,setSession]=useState(null);
  const[profile,setProfile]=useState(null);
  const[allProfiles,setAllProfiles]=useState({});
  const[tasks,setTasks]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[ann,setAnn]=useState(null);
  const[annDis,setAnnDis]=useState(false);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState("board");
  const[showProfile,setShowProfile]=useState(false);
  const[showEditP,setShowEditP]=useState(false);
  const[showAnn,setShowAnn]=useState(false);
  const[detailTask,setDetailTask]=useState(null);
  const[editTask,setEditTask]=useState(null);
  const[shareTask,setShareTask]=useState(null);
  const profRef=useRef(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);if(!session)setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,s)=>{setSession(s);if(!s){setProfile(null);setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session?.user?.id)loadProfile();},[session?.user?.id]);

  const loadProfile=async()=>{
    const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
    setProfile(data);profRef.current=data;setLoading(false);
  };

  useEffect(()=>{if(!profile)return;sb.from("profiles").select("*").then(({data})=>{const m={};(data||[]).forEach(p=>{m[p.id]=p;});setAllProfiles(m);});},[profile?.id]);

  useEffect(()=>{
    if(!profile)return;
    sb.from("app_config").select("*").eq("key",CKEY).single().then(({data})=>{if(data?.value)setCfg({...DEF_CFG,...data.value});});
    sb.from("announcements").select("*").eq("active",true).order("created_at",{ascending:false}).limit(1).then(({data})=>{if(data?.[0])setAnn(data[0].content);});
    const ch=sb.channel("cfg-rt").on("postgres_changes",{event:"*",schema:"public",table:"app_config"},()=>{sb.from("app_config").select("*").eq("key",CKEY).single().then(({data})=>{if(data?.value)setCfg({...DEF_CFG,...data.value});});}).subscribe();
    return()=>sb.removeChannel(ch);
  },[profile?.id]);

  useEffect(()=>{
    if(!profile)return;
    loadTasks();
    const ch=sb.channel("tasks-rt").on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>loadTasks()).subscribe();
    return()=>sb.removeChannel(ch);
  },[profile?.id]);

  const loadTasks=async()=>{
    const pid=profRef.current?.id;if(!pid)return;
    const{data:own}=await sb.from("tasks").select("*").eq("owner_id",pid).order("created_at",{ascending:false});
    const{data:shares}=await sb.from("task_shares").select("task_id").eq("shared_with",pid);
    let shared=[];
    if(shares?.length){const ids=[...new Set(shares.map(s=>s.task_id))];const{data}=await sb.from("tasks").select("*").in("id",ids);shared=data||[];}
    const all=[...(own||[]),...shared];
    setTasks(all.filter((t,i,a)=>a.findIndex(x=>x.id===t.id)===i));
  };

  const logout=async()=>{await sb.auth.signOut();setSession(null);setProfile(null);};
  const Sp=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)"}}><div className="spinner spinner-lg"/></div>;

  if(loading)return<Sp/>;
  if(!session)return<AuthScreen/>;
  if(profile&&!profile.onboarding_done)return<OnboardingScreen user={session.user} onDone={loadProfile}/>;
  if(cfg.maintenance&&profile?.role!=="admin")return<MaintenanceScreen msg={cfg.maintenance_msg} isAdmin={false}/>;
  if(!profile)return<Sp/>;

  return(
    <div className="app-shell">
      {cfg.maintenance&&profile.role==="admin"&&<MaintenanceScreen msg={cfg.maintenance_msg} isAdmin onDisable={async()=>{const c={...cfg,maintenance:false};await sb.from("app_config").upsert({key:CKEY,value:c});setCfg(c);}}/>}
      <div className="topbar">
        <div className="topbar-logo">👾 <span>Task</span></div>
        <div className="topbar-nav">
          {[["board","📋","Tareas"],["dashboard","📊","Dashboard"],["calendar","📅","Calendario"]].map(([k,ic,lb])=>(
            <button key={k} className={`nav-tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{ic} <span>{lb}</span></button>
          ))}
        </div>
        <div className="flex center gap8">
          {(profile.role==="admin"||profile.role==="gerente")&&<button className="btn-ghost btn-sm" onClick={()=>setShowAnn(true)}>📢</button>}
          <div className="avatar" onClick={()=>setShowProfile(true)}>{initials(profile)}</div>
        </div>
      </div>
      <div className="main-content">
        {ann&&!annDis&&<AnnouncementBanner text={ann} onDismiss={()=>setAnnDis(true)}/>}
        {tab==="board"&&<BoardView tasks={tasks} profile={profile} allProfiles={allProfiles} cfg={cfg} onTaskOpen={setDetailTask} onNewTask={()=>setEditTask({})} onSaved={loadTasks}/>}
        {tab==="dashboard"&&<DashboardView tasks={tasks} profile={profile} allProfiles={allProfiles}/>}
        {tab==="calendar"&&<CalendarView tasks={tasks} onTaskClick={setDetailTask}/>}
      </div>
      {detailTask&&<TaskDetailModal task={detailTask} profile={profile} allProfiles={allProfiles} onClose={()=>setDetailTask(null)} onSaved={()=>{loadTasks();setDetailTask(null);}} onEdit={t=>{setDetailTask(null);setEditTask(t);}} onShare={t=>{setDetailTask(null);setShareTask(t);}}/>}
      {editTask!==null&&<TaskFormModal task={Object.keys(editTask).length===0?null:editTask} profile={profile} allProfiles={allProfiles} cfg={cfg} onClose={()=>setEditTask(null)} onSaved={loadTasks}/>}
      {shareTask&&<ShareModal task={shareTask} profile={profile} allProfiles={allProfiles} onClose={()=>setShareTask(null)} onSaved={loadTasks}/>}
      {showProfile&&<ProfileMenu profile={profile} onClose={()=>setShowProfile(false)} onLogout={logout} onEdit={()=>setShowEditP(true)}/>}
      {showEditP&&<EditProfileModal profile={profile} onClose={()=>setShowEditP(false)} onSaved={u=>setProfile(p=>({...p,...u}))}/>}
      {showAnn&&<AnnouncementsModal profile={profile} allProfiles={allProfiles} onClose={()=>setShowAnn(false)}/>}
      <ToastContainer/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
