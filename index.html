<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👾 Task</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { createClient } = supabase;

    const SB_URL = "https://gkjrcwjvbxvjwkdbywde.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdranJjd2p2Ynh2andrZGJ5d2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDA1MDAsImV4cCI6MjA4OTY3NjUwMH0.FD05kgJO97HkOG6whY-NavcN6NlcT5LHC-Cw-PJtuwI";
    const DOMAIN = "unauncuarto.com";
    const CKEY   = "uuc-cfg-v2";
    const sb     = createClient(SB_URL, SB_KEY);

    const DEF_CFG = {
      categories: ["Compras","Documentación","VBA / Excel","Administración","Moldes UUC","Reunión","Seguimiento","General"],
      priorities:  ["Alta","Media","Baja"],
      statuses:    ["Pendiente","En curso","Lista","Bloqueada","Descartada"],
    };

    const FLOW = {
      "Pendiente":  { next:"En curso",  prev:null },
      "En curso":   { next:"Lista",     prev:"Pendiente" },
      "Lista":      { next:null,        prev:"En curso" },
      "Bloqueada":  { next:"En curso",  prev:null },
      "Descartada": { next:null,        prev:null },
    };

    const SCOLS = { "Pendiente":"#94a3b8","En curso":"#3b82f6","Lista":"#10b981","Bloqueada":"#f97316","Descartada":"#475569" };
    const PCOLS = ["#ef4444","#f59e0b","#22c55e","#a78bfa"];
    const pc  = (p,l) => PCOLS[Math.max(0,l.indexOf(p)) % PCOLS.length];
    const sc  = s     => SCOLS[s] || "#94a3b8";
    const tod = ()    => new Date().toISOString().split("T")[0];
    const fmt = d     => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/,"$3/$2") : "";
    const nick= e     => e?.split("@")[0] || "—";

    const Btn   = ({on,children,onClick,style={}}) =>
      <button style={on?{...S.tOn,...style}:{...S.tab,...style}} onClick={onClick}>{children}</button>;
    const Chip  = ({bg,c,children}) =>
      <span style={{background:bg,color:c,fontSize:11,padding:"2px 7px",borderRadius:99,fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>;
    const Lbl   = ({children}) =>
      <label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:3,marginTop:9}}>{children}</label>;
    const Modal = ({children,onClose,wide}) => (
      <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose?.()}>
        <div style={{...S.modal,maxWidth:wide?680:520}}>{children}</div>
      </div>
    );

    /* ════════════════════════════════ LOGIN ════════════════════════════════ */
    function LoginScreen({onLogin}) {
      const [email,setEmail]=useState(""); const [pass,setPass]=useState("");
      const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
      const go = async () => {
        setErr("");
        if (email.split("@")[1]!==DOMAIN){setErr(`Solo correos @${DOMAIN}`);return;}
        setBusy(true);
        const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
        setBusy(false);
        if(error) setErr(error.message==="Invalid login credentials"?"Correo o contraseña incorrectos":error.message);
        else onLogin(data.user);
      };
      return (
        <div style={{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
          fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"}}>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:36,width:"100%",maxWidth:360}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontSize:44,marginBottom:8}}>👾</div>
              <div style={{fontSize:22,fontWeight:700,color:"#f8fafc",letterSpacing:"-0.5px"}}>Task</div>
              <div style={{fontSize:12,color:"#475569",marginTop:4}}>UnaUnCuarto · Gestión interna</div>
            </div>
            <Lbl>Correo institucional</Lbl>
            <input style={{...S.inp,marginBottom:2}} type="email" autoFocus placeholder={`nombre@${DOMAIN}`}
              value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/>
            <Lbl>Contraseña</Lbl>
            <input style={{...S.inp,marginBottom:16}} type="password" placeholder="••••••••"
              value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/>
            {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:12,background:"#7f1d1d33",padding:"8px 10px",borderRadius:6}}>{err}</div>}
            <button style={{...S.bAdd,width:"100%",padding:9,fontSize:14,opacity:busy?.6:1}} onClick={go} disabled={busy}>
              {busy?"Iniciando…":"Iniciar sesión"}
            </button>
            <p style={{fontSize:11,color:"#334155",textAlign:"center",marginTop:16,lineHeight:1.7}}>
              ¿Olvidaste tu contraseña?<br/>Contacta al administrador.
            </p>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════ MAIN APP ═════════════════════════════ */
    function MainApp({user,onLogout}) {
      const [tasks,setTasks]=useState([]); const [cfg,setCfg]=useState(()=>{
        try{return JSON.parse(localStorage.getItem(CKEY))||DEF_CFG;}catch{return DEF_CFG;}
      });
      const [usersMap,setUsersMap]=useState({});
      const [view,setView]=useState("board"); const [form,setForm]=useState(null); const [editId,setEditId]=useState(null);
      const [filter,setFilter]=useState({status:"all",priority:"all",category:"all"});
      const [search,setSearch]=useState(""); const [flash,setFlash]=useState({msg:"",ok:true});
      const [loading,setLoading]=useState(true); const [undo,setUndo]=useState(null);
      const [commCache,setCommCache]=useState({}); const [pendingShares,setPendingShares]=useState([]);
      const [shareModal,setShareModal]=useState(null); const [inviteModal,setInviteModal]=useState(false);
      const [commModal,setCommModal]=useState(null);
      const undoTimer=useRef(null);

      useEffect(()=>{
        loadAll();
        const sub=sb.channel("tasks-rt").on("postgres_changes",{event:"*",schema:"public",table:"tasks"},loadTasks).subscribe();
        return()=>sub.unsubscribe();
      },[]);

      useEffect(()=>{
        const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"&&undo){e.preventDefault();doUndo();}};
        window.addEventListener("keydown",h);
        return()=>window.removeEventListener("keydown",h);
      },[undo,tasks]);

      const loadAll=async()=>Promise.all([loadTasks(),loadProfiles(),loadPending()]);

      const loadTasks=async()=>{
        const{data,error}=await sb.from("tasks").select("*").order("id",{ascending:false});
        if(!error&&data)setTasks(data); else if(error)notify("⚠ "+error.message,false);
        setLoading(false);
      };
      const loadProfiles=async()=>{
        const{data}=await sb.from("profiles").select("id,email");
        if(data){const m={};data.forEach(p=>m[p.id]=p.email);setUsersMap(m);}
      };
      const loadPending=async()=>{
        const{data}=await sb.from("task_shares").select("id,task_id,owner_id,tasks(title)")
          .eq("shared_with",user.id).eq("status","pending");
        if(data)setPendingShares(data);
      };

      const notify=(msg,ok=true,undoData=null)=>{
        setFlash({msg,ok});
        if(undoData){
          clearTimeout(undoTimer.current); setUndo(undoData);
          undoTimer.current=setTimeout(()=>{setUndo(null);setFlash({msg:"",ok:true});},5000);
        } else setTimeout(()=>setFlash({msg:"",ok:true}),2500);
      };

      const doUndo=async()=>{
        if(!undo)return; clearTimeout(undoTimer.current);
        const{data,error}=await sb.from("tasks").update({status:undo.prev}).eq("id",undo.taskId).select().single();
        if(!error&&data){setTasks(p=>p.map(t=>t.id===undo.taskId?data:t));setUndo(null);notify("↩ Deshecho");}
      };

      /* ── CRUD ── */
      const createTask=async f=>{
        const{data,error}=await sb.from("tasks").insert({
          user_id:user.id,title:f.title.trim(),notes:f.notes||"",
          category:f.category,priority:f.priority,status:f.status,due:f.due||null,created:tod()
        }).select().single();
        if(!error&&data){setTasks(p=>[data,...p]);notify("✓ Tarea creada");}
        else notify("⚠ "+(error?.message||"Error"),false);
      };
      const updateFull=async(id,changes)=>{
        const{data,error}=await sb.from("tasks").update(changes).eq("id",id).select().single();
        if(!error&&data){setTasks(p=>p.map(t=>t.id===id?data:t));notify("✓ Guardado");}
        else notify("⚠ Error al guardar",false);
      };
      const advanceStatus=async(t,ns)=>{
        const{data,error}=await sb.from("tasks").update({status:ns}).eq("id",t.id).select().single();
        if(!error&&data){
          setTasks(p=>p.map(x=>x.id===t.id?data:x));
          notify(`→ ${ns}`,true,{taskId:t.id,prev:t.status,label:t.title});
        } else notify("⚠ Error",false);
      };
      const deleteTask=async(id,title)=>{
        if(!confirm(`¿Eliminar "${title}"?`))return;
        const{error}=await sb.from("tasks").delete().eq("id",id);
        if(!error){setTasks(p=>p.filter(t=>t.id!==id));notify("🗑 Eliminada");}
        else notify("⚠ Error al eliminar",false);
      };

      /* ── Comments ── */
      const loadComments=async taskId=>{
        if(commCache[taskId]!==undefined)return;
        setCommCache(p=>({...p,[taskId]:"loading"}));
        const{data}=await sb.from("comments").select("*").eq("task_id",taskId).order("created_at",{ascending:true});
        setCommCache(p=>({...p,[taskId]:data||[]}));
      };
      const addComment=async(taskId,body)=>{
        if(!body.trim())return;
        const{data,error}=await sb.from("comments").insert({task_id:taskId,user_id:user.id,body:body.trim()}).select().single();
        if(!error&&data){
          setCommCache(p=>({...p,[taskId]:[...(Array.isArray(p[taskId])?p[taskId]:[]),data]}));
          notify("💬 Comentario agregado");
        } else notify("⚠ Error al comentar",false);
      };
      const delComment=async(taskId,cid)=>{
        const{error}=await sb.from("comments").delete().eq("id",cid);
        if(!error)setCommCache(p=>({...p,[taskId]:p[taskId].filter(c=>c.id!==cid)}));
      };

      /* ── Sharing ── */
      const shareTask=async(taskId,email)=>{
        const target=Object.entries(usersMap).find(([,e])=>e===email.trim().toLowerCase());
        if(!target){notify("⚠ Usuario no encontrado",false);return;}
        const[targetId]=target;
        if(targetId===user.id){notify("⚠ No puedes compartirte a ti mismo",false);return;}
        const{error}=await sb.from("task_shares").insert({task_id:taskId,owner_id:user.id,shared_with:targetId});
        if(!error){notify("✓ Invitación enviada");setShareModal(null);}
        else if(error.code==="23505")notify("⚠ Ya compartida con ese usuario",false);
        else notify("⚠ "+error.message,false);
      };
      const respondShare=async(shareId,accept)=>{
        const{error}=await sb.from("task_shares").update({status:accept?"accepted":"rejected"}).eq("id",shareId);
        if(!error){
          setPendingShares(p=>p.filter(s=>s.id!==shareId));
          if(accept){loadTasks();notify("✓ Tarea aceptada");}else notify("Invitación rechazada");
        }
      };

      /* ── Form ── */
      const openNew=()=>{
        setForm({title:"",notes:"",category:cfg.categories.at(-1),
          priority:cfg.priorities[1]??cfg.priorities[0],status:cfg.statuses[0],due:""});
        setEditId(null);setView("new");
      };
      const openEdit=t=>{
        setForm({title:t.title,notes:t.notes||"",category:t.category,priority:t.priority,status:t.status,due:t.due||""});
        setEditId(t.id);setView("new");
      };
      const submit=async()=>{
        if(!form?.title?.trim()){notify("⚠ El título es obligatorio",false);return;}
        if(editId)await updateFull(editId,form); else await createTask(form);
        setView("board");setForm(null);setEditId(null);
      };
      const saveCfg=c=>{setCfg(c);localStorage.setItem(CKEY,JSON.stringify(c));};

      /* ── Filter ── */
      const visible=tasks.filter(t=>{
        if(filter.status!=="all"&&t.status!==filter.status)return false;
        if(filter.priority!=="all"&&t.priority!==filter.priority)return false;
        if(filter.category!=="all"&&t.category!==filter.category)return false;
        const q=search.toLowerCase();
        if(q&&!t.title.toLowerCase().includes(q)&&!(t.notes||"").toLowerCase().includes(q))return false;
        return true;
      });
      const hasFilter=search||Object.values(filter).some(v=>v!=="all");
      const clearFilter=()=>{setSearch("");setFilter({status:"all",priority:"all",category:"all"});};
      const goBoard=()=>setView("board");
      const colOrder=[...cfg.statuses.filter(s=>s!=="Descartada"),...(cfg.statuses.includes("Descartada")?["Descartada"]:[])];

      return (
        <div style={S.wrap}>

          {/* HEADER */}
          <div style={S.hdr}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18,fontWeight:700,color:"#f8fafc",letterSpacing:"-0.3px"}}>👾 Task</span>
              {flash.msg&&!undo&&(
                <span style={{fontSize:12,fontWeight:600,padding:"3px 9px",borderRadius:99,
                  color:flash.ok?"#22c55e":"#f87171",background:flash.ok?"#14532d33":"#7f1d1d33"}}>
                  {flash.msg}
                </span>
              )}
              {loading&&<span style={{fontSize:12,color:"#475569"}}>cargando…</span>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <Btn on={view==="board"} onClick={goBoard}>📋 Board</Btn>
              <Btn on={view==="list"}  onClick={()=>setView("list")}>☰ Lista</Btn>
              <button style={S.bAdd}  onClick={openNew}>+ Nueva</button>
              <button style={S.bIco}  onClick={()=>setView("cal")}>📅</button>
              <button style={{...S.bIco,position:"relative"}} onClick={()=>{loadPending();setInviteModal(true);}}>
                🔔
                {pendingShares.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",
                  color:"#fff",fontSize:9,fontWeight:700,borderRadius:99,padding:"1px 4px",lineHeight:1.2}}>
                  {pendingShares.length}</span>}
              </button>
              <button style={S.bIco} onClick={()=>setView("settings")}>⚙️</button>
              <div style={{display:"flex",alignItems:"center",gap:7,marginLeft:4,paddingLeft:10,borderLeft:"1px solid #1e293b"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"#1e40af",display:"flex",
                  alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#bfdbfe",flexShrink:0}}>
                  {user.email?.[0]?.toUpperCase()}
                </div>
                <span style={{fontSize:11,color:"#475569",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {user.email}
                </span>
                <button style={{...S.bSec,fontSize:11,padding:"3px 8px"}} onClick={onLogout}>Salir</button>
              </div>
            </div>
          </div>

          {/* UNDO TOAST */}
          {undo&&(
            <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
              background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 16px",
              display:"flex",alignItems:"center",gap:12,zIndex:200,boxShadow:"0 8px 32px #00000066",minWidth:280}}>
              <span style={{fontSize:13,color:"#f1f5f9",flex:1}}>
                Movida a <b>{tasks.find(t=>t.id===undo.taskId)?.status}</b>
              </span>
              <button style={S.bAdd} onClick={doUndo}>↩ Deshacer</button>
              <button style={S.ib} onClick={()=>{clearTimeout(undoTimer.current);setUndo(null);}}>✕</button>
            </div>
          )}

          {/* STAT CHIPS */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {colOrder.map(s=>{
              const n=tasks.filter(t=>t.status===s).length;
              return(
                <div key={s} style={{...S.stat,borderColor:filter.status===s?sc(s):"transparent"}}
                  onClick={()=>setFilter(f=>({...f,status:f.status===s?"all":s}))}>
                  <span style={{fontSize:10,color:sc(s),fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s}</span>
                  <span style={{fontSize:22,fontWeight:700,color:"#f1f5f9",lineHeight:1.1}}>{n}</span>
                </div>
              );
            })}
            <div style={{...S.stat,cursor:"default"}}>
              <span style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>Total</span>
              <span style={{fontSize:22,fontWeight:700,color:"#f1f5f9",lineHeight:1.1}}>{tasks.length}</span>
            </div>
          </div>

          {/* FILTERS */}
          <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <input style={S.sinp} placeholder="🔍 Buscar…" value={search} onChange={e=>setSearch(e.target.value)}/>
            {[["status","Estado",colOrder],["priority","Prioridad",cfg.priorities],["category","Categoría",cfg.categories]]
              .map(([k,lbl,opts])=>(
                <select key={k} style={S.sel} value={filter[k]} onChange={e=>setFilter(f=>({...f,[k]:e.target.value}))}>
                  <option value="all">{lbl}: todos</option>
                  {opts.map(x=><option key={x} value={x}>{x}</option>)}
                </select>
              ))}
            {hasFilter&&<button style={S.bSec} onClick={clearFilter}>✕ limpiar</button>}
            {hasFilter&&<span style={{fontSize:12,color:"#475569"}}>{visible.length}/{tasks.length}</span>}
          </div>

          {/* BOARD */}
          {view==="board"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10}}>
              {colOrder.map(s=>{
                const col=visible.filter(t=>t.status===s);
                return(
                  <div key={s} style={{...S.col,opacity:s==="Descartada"?.75:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10,padding:"0 2px"}}>
                      <span style={{width:9,height:9,borderRadius:"50%",background:sc(s),flexShrink:0,boxShadow:`0 0 6px ${sc(s)}66`}}/>
                      <span style={{fontSize:12,fontWeight:600,color:"#94a3b8",flex:1}}>{s}</span>
                      <span style={{fontSize:11,color:"#475569",background:"#0f172a",borderRadius:99,padding:"1px 8px",fontWeight:600}}>{col.length}</span>
                    </div>
                    {col.length===0
                      ?<div style={S.empty}>vacío</div>
                      :col.map(t=>(
                        <TCard key={t.id} t={t} cfg={cfg} userId={user.id} usersMap={usersMap}
                          onEdit={()=>openEdit(t)} onDelete={()=>deleteTask(t.id,t.title)}
                          onStatus={ns=>advanceStatus(t,ns)} onShare={()=>setShareModal(t.id)}
                          onOpenComments={()=>{loadComments(t.id);setCommModal(t.id);}}
                          onHoverComments={()=>loadComments(t.id)}
                          comments={Array.isArray(commCache[t.id])?commCache[t.id]:null}
                        />
                      ))
                    }
                  </div>
                );
              })}
            </div>
          )}

          {/* LIST */}
          {view==="list"&&(
            <div>
              {visible.length===0
                ?<div style={{...S.empty,padding:40}}>Sin tareas</div>
                :[...visible].sort((a,b)=>cfg.priorities.indexOf(a.priority)-cfg.priorities.indexOf(b.priority)).map(t=>(
                  <TRow key={t.id} t={t} cfg={cfg} userId={user.id} usersMap={usersMap}
                    onEdit={()=>openEdit(t)} onDelete={()=>deleteTask(t.id,t.title)}
                    onStatus={ns=>advanceStatus(t,ns)} onShare={()=>setShareModal(t.id)}
                    onOpenComments={()=>{loadComments(t.id);setCommModal(t.id);}}
                    comments={Array.isArray(commCache[t.id])?commCache[t.id]:null}
                  />
                ))
              }
            </div>
          )}

          {/* MODAL: new/edit */}
          {view==="new"&&form&&(
            <Modal onClose={goBoard}>
              <h3 style={{margin:"0 0 4px",color:"#f8fafc",fontSize:15}}>{editId?"✏️ Editar":"➕ Nueva tarea"}</h3>
              <p style={{fontSize:11,color:"#475569",marginBottom:4}}>{editId?`ID #${editId}`:"* obligatorio"}</p>
              <Lbl>Título *</Lbl>
              <input style={S.inp} value={form.title} autoFocus placeholder="¿Qué hay que hacer?"
                onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()}/>
              <Lbl>Notas</Lbl>
              <textarea style={{...S.inp,height:60,resize:"vertical"}} value={form.notes||""}
                placeholder="Contexto…" onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                {[["Categoría","category",cfg.categories],["Prioridad","priority",cfg.priorities],["Estado","status",cfg.statuses]]
                  .map(([lb,k,o])=>(
                    <div key={k}><Lbl>{lb}</Lbl>
                      <select style={S.inp} value={form[k]||""} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}>
                        {o.map(x=><option key={x}>{x}</option>)}
                      </select>
                    </div>
                  ))}
                <div><Lbl>Fecha vence</Lbl>
                  <input type="date" style={S.inp} value={form.due||""} onChange={e=>setForm(f=>({...f,due:e.target.value}))}/>
                </div>
              </div>

    /* ════════════════════════════════ TASK CARD ════════════════════════════ */
    function TCard({t,cfg,userId,usersMap,onEdit,onDelete,onStatus,onShare,onOpenComments,onHoverComments,comments}) {
      const [menuOpen,setMenuOpen]=useState(false); const [showTip,setShowTip]=useState(false);
      const menuRef=useRef(null);
      const overdue=t.due&&t.due<tod()&&!["Lista","Descartada"].includes(t.status);
      const flow=FLOW[t.status]||{}; const isOwner=t.user_id===userId;
      const commCnt=comments?.length??0;

      useEffect(()=>{
        const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};
        if(menuOpen)document.addEventListener("mousedown",h);
        return()=>document.removeEventListener("mousedown",h);
      },[menuOpen]);

      return(
        <div style={{...S.card,borderLeft:`3px solid ${pc(t.priority,cfg.priorities)}`,opacity:t.status==="Descartada"?.6:1}}>
          {/* title + menu */}
          <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
            <span style={{flex:1,fontSize:13,color:"#f1f5f9",fontWeight:500,lineHeight:1.4,wordBreak:"break-word"}}>{t.title}</span>
            <div ref={menuRef} style={{position:"relative",flexShrink:0}}>
              <button style={S.ib} onClick={()=>setMenuOpen(o=>!o)}>⋯</button>
              {menuOpen&&(
                <div style={S.dd}>
                  {isOwner&&<button style={S.ddi} onClick={()=>{onEdit();setMenuOpen(false);}}>✏️ Editar</button>}
                  {isOwner&&<button style={S.ddi} onClick={()=>{onShare();setMenuOpen(false);}}>🤝 Compartir</button>}
                  <hr style={{border:"none",borderTop:"1px solid #334155",margin:"4px 0"}}/>
                  {cfg.statuses.filter(s=>s!==t.status).map(s=>(
                    <button key={s} style={S.ddi} onClick={()=>{onStatus(s);setMenuOpen(false);}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:sc(s),flexShrink:0,display:"inline-block"}}/>→ {s}
                    </button>
                  ))}
                  {isOwner&&<><hr style={{border:"none",borderTop:"1px solid #334155",margin:"4px 0"}}/>
                    <button style={{...S.ddi,color:"#f87171"}} onClick={()=>{onDelete();setMenuOpen(false);}}>🗑️ Eliminar</button>
                  </>}
                </div>
              )}
            </div>
          </div>
          {/* notes */}
          {t.notes&&<p style={{fontSize:11,color:"#64748b",marginBottom:6,lineHeight:1.5,
            overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{t.notes}</p>}
          {/* chips */}
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
            <Chip bg={pc(t.priority,cfg.priorities)+"22"} c={pc(t.priority,cfg.priorities)}>{t.priority}</Chip>
            <Chip bg="#0f172a" c="#475569">{t.category}</Chip>
            {t.due&&<Chip bg={overdue?"#7f1d1d33":"#1e293b"} c={overdue?"#f87171":"#475569"}>📅 {fmt(t.due)}{overdue?" ⚠":""}</Chip>}
            {t.user_id!==userId&&<Chip bg="#1e3a5f" c="#93c5fd">🤝</Chip>}
          </div>
          {/* flow + comment */}
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            {t.status==="Descartada"
              ?<button style={{...S.bFlow,color:"#94a3b8"}} onClick={()=>onStatus("Pendiente")}>↺ Restaurar</button>
              :<>
                {flow.prev&&<button style={S.bFlow} onClick={()=>onStatus(flow.prev)}>← {flow.prev}</button>}
                {flow.next&&<button style={{...S.bFlow,background:"#1e3a5f33",color:"#93c5fd",borderColor:"#3b82f644"}}
                  onClick={()=>onStatus(flow.next)}>{flow.next} →</button>}
              </>
            }
            {/* comment icon + hover tooltip */}
            <div style={{marginLeft:"auto",position:"relative"}}>
              <button style={{...S.ib,fontSize:14,color:commCnt>0?"#60a5fa":"#475569",position:"relative"}}
                onMouseEnter={()=>{onHoverComments();setShowTip(true);}}
                onMouseLeave={()=>setShowTip(false)}
                onClick={onOpenComments}>
                💬
                {commCnt>0&&<span style={{position:"absolute",top:-3,right:-3,background:"#3b82f6",
                  color:"#fff",fontSize:8,fontWeight:700,borderRadius:99,padding:"1px 3px",lineHeight:1.2}}>{commCnt}</span>}
              </button>
              {showTip&&commCnt>0&&comments&&(
                <div style={{position:"absolute",bottom:"calc(100% + 6px)",right:0,background:"#0f172a",
                  border:"1px solid #334155",borderRadius:8,padding:"10px 12px",width:250,zIndex:100,
                  boxShadow:"0 4px 20px #00000088",pointerEvents:"none"}}>
                  <p style={{fontSize:11,color:"#475569",marginBottom:7,fontWeight:600}}>Comentarios ({commCnt})</p>

                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════ TASK ROW ═════════════════════════════ */

              ?<button style={{...S.bFlow,fontSize:11}} onClick={()=>onStatus("Pendiente")}>↺ Restaurar</button>
              :<>
                {flow.prev&&<button style={{...S.bFlow,fontSize:11}} onClick={()=>onStatus(flow.prev)}>← {flow.prev}</button>}
                {flow.next&&<button style={{...S.bFlow,background:"#1e3a5f33",color:"#93c5fd",borderColor:"#3b82f644",fontSize:11}} onClick={()=>onStatus(flow.next)}>{flow.next} →</button>}

                  </button>

                </>}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════ CAL PICKER ═══════════════════════════ */
    function CalPicker({tasks,onClose}) {
      const [sel,setSel]=useState(null); const [date,setDate]=useState(tod());
      const t=tasks.find(x=>x.id===sel);
      const go=()=>{
        if(!t)return;
        const d=date.replace(/-/g,"");
        const desc=[`Cat: ${t.category}`,`Pri: ${t.priority}`,t.notes?`Notas: ${t.notes}`:""].filter(Boolean).join(" | ");
        window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.title)}&dates=${d}T090000/${d}T100000&details=${encodeURIComponent(desc)}`,"_blank","noopener");
        onClose();
      };
      return(
        <div>
          {tasks.length===0?<p style={{color:"#475569"}}>Sin tareas.</p>:<>
            <Lbl>Tarea</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto",marginBottom:12}}>
              {tasks.filter(x=>x.status!=="Descartada").map(x=>(
                <div key={x.id} onClick={()=>setSel(x.id)} style={{padding:"8px 12px",borderRadius:7,cursor:"pointer",
                  border:`1px solid ${sel===x.id?"#3b82f6":"#334155"}`,background:sel===x.id?"#1e3a5f":"#0f172a",
                  display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:sc(x.status),flexShrink:0}}/>
                  <span style={{flex:1,color:"#f1f5f9",fontSize:13}}>{x.title}</span>
                </div>
              ))}
            </div>
            <Lbl>Fecha</Lbl>
            <input type="date" style={{...S.inp,marginBottom:14}} value={date} onChange={e=>setDate(e.target.value)}/>
            {t&&<div style={{background:"#0f172a",borderRadius:7,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#94a3b8"}}>
              <b style={{color:"#f1f5f9"}}>{t.title}</b> → {date} · 09:00–10:00
            </div>}
            <div style={{display:"flex",gap:8}}>
              <button style={{background:"#064e3b",border:"1px solid #10b981",color:"#6ee7b7",borderRadius:6,
                padding:"6px 13px",cursor:"pointer",fontWeight:600,fontSize:13,opacity:sel?1:.45}}
                disabled={!sel} onClick={go}>📅 Abrir en Calendar</button>
              <button style={S.bSec} onClick={onClose}>Cancelar</button>
            </div>
          </>}
        </div>
      );
    }

    /* ════════════════════════════════ CFG EDITOR ═══════════════════════════ */
    function CfgEditor({cfg,onSave}) {
      const [d,setD]=useState(JSON.parse(JSON.stringify(cfg))); const [tab,setTab]=useState("categories");
      const tabs=[{k:"categories",l:"Categorías"},{k:"priorities",l:"Prioridades"},{k:"statuses",l:"Estados"}];
      const add=()=>{const v=prompt("Nombre:");if(v?.trim())setD(x=>({...x,[tab]:[...x[tab],v.trim()]}));};
      const rm=i=>setD(x=>({...x,[tab]:x[tab].filter((_,j)=>j!==i)}));
      const rn=i=>{const v=prompt("Nuevo nombre:",d[tab][i]);if(v?.trim()){const a=[...d[tab]];a[i]=v.trim();setD(x=>({...x,[tab]:a}));}};
      const mv=(i,dir)=>{const a=[...d[tab]],j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];setD(x=>({...x,[tab]:a}));};
      return(
        <div>
          <div style={{display:"flex",gap:5,marginBottom:11}}>{tabs.map(t=><Btn key={t.k} on={tab===t.k} onClick={()=>setTab(t.k)}>{t.l}</Btn>)}</div>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:11,maxHeight:200,overflowY:"auto"}}>
            {d[tab].map((item,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"#0f172a",borderRadius:6,padding:"6px 10px"}}>
                <span style={{flex:1,color:"#f1f5f9",fontSize:13}}>{item}</span>
                <button style={S.ib} onClick={()=>rn(i)}>✏️</button>
                <button style={S.ib} onClick={()=>mv(i,-1)}>↑</button>
                <button style={S.ib} onClick={()=>mv(i,1)}>↓</button>
                <button style={S.ib} onClick={()=>rm(i)}>🗑️</button>
              </div>
            ))}
          </div>
          <button style={{...S.bSec,width:"100%",marginBottom:11}} onClick={add}>+ Agregar</button>
          <button style={S.bAdd} onClick={()=>onSave(d)}>💾 Guardar</button>
        </div>
      );
    }

      empty: {color:"#334155",fontSize:12,textAlign:"center",padding:"18px 0"},
      tab:   {background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12},
      tOn:   {background:"#1e3a5f",border:"1px solid #3b82f6",color:"#93c5fd",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12},
      bAdd:  {background:"#2563eb",border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:600,fontSize:13},
      bSec:  {background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:13},
      bIco:  {background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:14,position:"relative"},
      bFlow: {background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11,whiteSpace:"nowrap"},
      sinp:  {background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#f1f5f9",padding:"5px 10px",fontSize:13,flex:1,minWidth:140,outline:"none"},
      sel:   {background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#94a3b8",padding:"5px 8px",fontSize:12,cursor:"pointer",outline:"none"},
      ov:    {position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,backdropFilter:"blur(2px)"},
      modal: {background:"#1e293b",borderRadius:14,padding:22,width:"100%",border:"1px solid #334155",maxHeight:"92vh",overflowY:"auto"},
      inp:   {width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:6,color:"#f1f5f9",padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"inherit"},
      dd:    {position:"absolute",top:"100%",right:0,background:"#0f172a",border:"1px solid #334155",borderRadius:9,padding:"6px",zIndex:30,minWidth:155,boxShadow:"0 8px 24px #00000055",marginTop:3},
      ddi:   {display:"flex",alignItems:"center",gap:7,width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:12,padding:"5px 8px",cursor:"pointer",borderRadius:5,textAlign:"left",whiteSpace:"nowrap"},
    };

    /* ════════════════════════════════ ROOT ═════════════════════════════════ */
    function Root() {
      const [user,setUser]=useState(null); const [checking,setChecking]=useState(true);
      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setChecking(false);});
        const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user??null));
        return()=>subscription.unsubscribe();
      },[]);
      const logout=async()=>{await sb.auth.signOut();setUser(null);};
      if(checking)return(
        <div style={{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",
          justifyContent:"center",color:"#475569",fontFamily:"system-ui",fontSize:20}}>👾</div>
      );
      return user?<MainApp user={user} onLogout={logout}/>:<LoginScreen onLogin={setUser}/>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
