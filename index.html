const fmt=d=>{if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"2-digit"});};
const fmtFull=d=>{if(!d)return"";return new Date(d).toLocaleString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});};
const fmtHrs=h=>{if(h===null||h===undefined)return"—";if(h<1)return Math.round(h*60)+"min";if(h<24)return Math.round(h)+"h";return Math.round(h/24)+"d";};

// FIX 1: ISO week — igual que calendario-365.mx (semana comienza lunes)
const getISOWeek=d=>{
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dow=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-dow);
  const y0=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y0)/86400000)+1)/7);
};

// FIX 2: PIN anim — nombres hardcoded, aplicados via style inline
const PIN_ANIM={
  pendiente:"pp-pendiente 1.5s ease-in-out infinite",
  en_curso:"pp-en_curso 1.5s ease-in-out infinite",
  lista:"pp-lista 1.5s ease-in-out infinite",
  bloqueada:"pp-bloqueada 1.5s ease-in-out infinite",
  descartada:"pp-descartada 1.5s ease-in-out infinite",
};
const addPinAnim=(task,base={})=>task.is_pinned

// FIX 6: canEditTask — admin siempre, dueño solo si NO es subtarea asignada
const canEditTask=(task,profile)=>{
  if(profile.role==="admin")return true;
  if(task.owner_id!==profile.id)return false; // no es dueño
  if(task.is_subtask)return false;             // es subtarea asignada por otro

};

// FIX 3: Toasts — cada item maneja su propio timer, no el contenedor
let _addToast=null;
const toast=(msg,type="info",undo=null)=>{
  if(_addToast)_addToast({id:Date.now()+(Math.random()*99|0),msg,type,undo});
};

function ToastItem({t,onRemove}){
  useEffect(()=>{
    const tid=setTimeout(()=>onRemove(t.id),4000);
    return()=>clearTimeout(tid);
  },[]);
  return(
    <div className="toast">
      <span>{t.type==="error"?"❌":t.type==="success"?"✅":"ℹ️"}</span>
      <span style={{flex:1}}>{t.msg}</span>
      {t.undo&&<button className="t-undo" onClick={()=>{t.undo();onRemove(t.id);}}>Deshacer</button>}
      <button className="t-close" onClick={()=>onRemove(t.id)}>✕</button>
    </div>
  );
}
function ToastContainer(){
  const[ts,setTs]=useState([]);
  useEffect(()=>{_addToast=t=>setTs(p=>[...p,t]);return()=>{_addToast=null;};},[]);
  const rm=useCallback(id=>setTs(p=>p.filter(t=>t.id!==id)),[]);
  return <div id="toast-container">{ts.map(t=><ToastItem key={t.id} t={t} onRemove={rm}/>)}</div>;
}

// Portal helper
function Portal({children}){
  const el=useRef(null);
  if(!el.current)el.current=document.createElement("div");
  useEffect(()=>{document.body.appendChild(el.current);return()=>{try{document.body.removeChild(el.current);}catch{}};},[]);
  return ReactDOM.createPortal(children,el.current);
}

// FIX 4: DotsMenu — revertido a onClick simple + ref booleano para no cancelar el click del item
function DotsMenu({task,profile,onAction}){
  const[open,setOpen]=useState(false);
  const[pos,setPos]=useState({top:0,right:0});
  const btnRef=useRef(null);
  const clickingRef=useRef(false); // true mientras el cursor está sobre un item

  if(task.owner_id!==profile.id&&profile.role!=="admin")return null;
  const opts=task.archived?["desarchivar"]:DOTS_OPTS[task.status]||[];
  if(!opts.length)return null;

  const openMenu=e=>{
    e.stopPropagation();
    const r=btnRef.current.getBoundingClientRect();
    setPos({top:r.bottom+4,right:window.innerWidth-r.right});
    setOpen(true);
  };

  useEffect(()=>{
    if(!open)return;
    const fn=e=>{
      if(clickingRef.current)return; // item en proceso, no cerrar
      if(btnRef.current&&btnRef.current.contains(e.target))return;
      setOpen(false);
    };
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[open]);

  const META={
    pendiente:{icon:"⏳",label:"→ Pendiente"},en_curso:{icon:"🔵",label:"→ En curso"},
    lista:{icon:"✅",label:"→ Lista"},bloqueada:{icon:"🔴",label:"→ Bloqueada"},
    descartada:{icon:"❌",label:"→ Descartada"},archivar:{icon:"📦",label:"Archivar"},
    desarchivar:{icon:"📤",label:"Desarchivar"},
  };

  return(
    <div onClick={e=>e.stopPropagation()}>
      <button ref={btnRef} className="btn-icon" style={{fontSize:17,letterSpacing:1}} onClick={openMenu}>⋮</button>
      {open&&<Portal>
        <div className="dots-dd" style={{top:pos.top,right:pos.right}}>
          {opts.map(o=>(
            <div key={o}
              className={"dots-item"+(o==="descartada"||o==="archivar"?" danger":"")}
              onMouseEnter={()=>{clickingRef.current=true;}}
              onMouseLeave={()=>{clickingRef.current=false;}}
              onClick={e=>{e.stopPropagation();setOpen(false);onAction(o);}}>
              {META[o]?.icon} {META[o]?.label||o}
            </div>
          ))}
        </div>
      </Portal>}
    </div>
  );
}

      <div className="field"><label>Título *</label><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="¿Qué hay que hacer?"/></div>
      <div className="field"><label>Descripción</label><textarea value={form.description} onChange={e=>set("description",e.target.value)}/></div>
      <div className="flex gap8"><div className="field grow"><label>Fecha límite</label><input type="date" value={form.due_date} onChange={e=>set("due_date",e.target.value)}/></div><div className="field grow"><label>Categoría</label><select value={form.category} onChange={e=>set("category",e.target.value)}><option value="">—</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select></div></div>
      <div className="field"><label>Tags</label><TagInput tags={form.tags} onChange={v=>set("tags",v)}/></div>
      <div className="flex gap16 wrap">
        <label className="flex center gap8" style={{cursor:"pointer",marginBottom:0}}><input type="checkbox" checked={form.is_pinned} onChange={e=>set("is_pinned",e.target.checked)} style={{width:"auto"}}/><span>📌 Fijar</span></label>
        {(profile.role==="admin"||profile.role==="gerente")&&<label className="flex center gap8" style={{cursor:"pointer",marginBottom:0}}><input type="checkbox" checked={form.block_on_subtasks} onChange={e=>set("block_on_subtasks",e.target.checked)} style={{width:"auto"}}/><span>⛔ Bloquear si subtareas pendientes</span></label>}
      </div>
      <div className="flex gap8 end"><button className="btn-secondary" onClick={onClose}>Cancelar</button><button className="btn-primary" onClick={save} disabled={loading}>{loading?<span className="spinner"/>:isEdit?"Guardar":"Crear"}</button></div>
    </div>}
  </div></div>;
}

function ShareModal({task,profile,allProfiles,onClose,onSaved}){
  const canAssign=profile.role==="admin"||profile.role==="gerente";
  const[sel,setSel]=useState("");const[due,setDue]=useState("");const[note,setNote]=useState("");const[loading,setLoading]=useState(false);
  const myRank=ROLE_RANK[profile.role]||1,target=allProfiles[sel];
  const mode=canAssign&&sel&&(ROLE_RANK[target?.role]||1)<myRank?"assign":"share";
  const users=Object.values(allProfiles).filter(p=>p.id!==profile.id);
  const submit=async()=>{if(!sel){toast("Selecciona usuario","error");return;}setLoading(true);
    if(mode==="assign"){
      const{error}=await sb.from("tasks").insert({title:task.title+" (subtarea)",description:note||task.description,owner_id:sel,parent_id:task.id,due_date:due||task.due_date,status:"pendiente",category:task.category,tags:task.tags,is_subtask:true});
      if(!error){await sb.from("bitacora").insert({task_id:task.id,user_id:profile.id,action:"asignó a",detail:target?.nombre+" "+target?.apellido});if(target?.telegram_chat_id)await tgSend(target.telegram_chat_id,"📋 <b>Subtarea asignada</b>\n"+task.folio+" — "+task.title+"\nPor: "+profile.nombre+(note?"\n"+note:""));toast("Asignado a "+target?.nombre,"success");}else toast(error.message,"error");
    }else{
      // FIX 6: compartir no cambia owner, solo inserta en task_shares
      const{error}=await sb.from("task_shares").insert({task_id:task.id,shared_by:profile.id,shared_with:sel,note});
      if(!error){if(target?.telegram_chat_id)await tgSend(target.telegram_chat_id,"🔗 <b>Tarea compartida</b>\n"+task.folio+" — "+task.title+"\nPor: "+profile.nombre+(note?"\n"+note:""));toast("Compartido con "+target?.nombre,"success");}else toast(error.message,"error");
    }
    setLoading(false);onSaved();onClose();};
  return <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-header"><span className="modal-title">Asignar / Compartir</span><button className="modal-close" onClick={onClose}>✕</button></div>
    <div className="card" style={{marginBottom:16,background:"var(--bg3)",padding:"10px 14px"}}><div className="t-sm bold truncate">{task.folio} — {task.title}</div></div>
    {sel&&<div className="flex center gap8" style={{marginBottom:12,padding:"8px 12px",background:mode==="assign"?"rgba(59,130,246,.1)":"rgba(34,197,94,.1)",borderRadius:"var(--radius)"}}><span>{mode==="assign"?"⬇️":"🔗"}</span><span className="t-sm bold">{mode==="assign"?"Asignar subtarea":"Compartir (solo visualización)"}</span></div>}
    <div className="flex col gap12">
      <div className="field"><label>Para *</label><UserPicker users={users} value={sel} onChange={setSel}/></div>
      {mode==="assign"&&<div className="field"><label>Fecha límite</label><input type="date" value={due} onChange={e=>setDue(e.target.value)}/></div>}
      <div className="field"><label>Nota</label><textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={mode==="assign"?"Instrucciones...":"¿Por qué compartes esto?"}/></div>
      <div className="flex gap8 end"><button className="btn-secondary" onClick={onClose}>Cancelar</button><button className="btn-primary" onClick={submit} disabled={loading}>{loading?<span className="spinner"/>:mode==="assign"?"Asignar":"Compartir"}</button></div>
    </div>
  </div></div>;
}

// ── task detail ───────────────────────────────────────────────────────────────
function TaskDetailModal({task,profile,allProfiles,onClose,onSaved,onEdit,onShare}){
  const[tab,setTab]=useState("detail");
  const[comments,setComments]=useState([]);
  const[bitacora,setBitacora]=useState([]);
  const[subtasks,setSubtasks]=useState([]);
  const[newCmt,setNewCmt]=useState("");
  const[loadingCmt,setLoadingCmt]=useState(false);
  const[confirm,setConfirm]=useState(null);
  
  const[mention,setMention]=useState({open:false,query:"",start:-1,active:0});
  const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  
  const mentionPool=useMemo(()=>Object.values(allProfiles||{}).map(p=>{
    const full=((p.nombre||"")+" "+(p.apellido||"")).trim();
    return {...p,_full:full,_search:norm(full+" "+(p.email||""))};
  }).filter(p=>p._full),[allProfiles]);
  
  const mentionList=useMemo(()=>{
    if(!mention.open)return[];
    const q=norm(mention.query);
    const out=mentionPool.filter(p=>!q||p._search.includes(q));
    return out.slice(0,8);
  },[mention.open,mention.query,mentionPool]);
  
  const updateMentionState=(val,caret)=>{
    const before=val.slice(0,caret);
    const at=before.lastIndexOf("@");
    if(at===-1){setMention({open:false,query:"",start:-1,active:0});return;}
    const left=at===0?" ":before[at-1];
    if(left!==" "&&left!=="\n"&&left!=="\t"){setMention({open:false,query:"",start:-1,active:0});return;}
    const q=before.slice(at+1);
    if(/\s/.test(q)){setMention({open:false,query:"",start:-1,active:0});return;}
    setMention({open:true,query:q,start:at,active:0});
  };
  
  const insertMention=(p)=>{
    const full=((p.nombre||"")+" "+(p.apellido||"")).trim()||"Usuario";
    const token="@["
      +full.replace(/\]/g,"")
      +"](u_"+p.id+")";
    const pre=newCmt.slice(0,mention.start);
    const post=newCmt.slice(mention.start+1+mention.query.length);
    setNewCmt(pre+token+" "+post);
    setMention({open:false,query:"",start:-1,active:0});
  };
  const isOwner=task.owner_id===profile.id,isAdmin=profile.role==="admin",isGer=profile.role==="gerente"||isAdmin;
  const canEdit=canEditTask(task,profile);

  useEffect(()=>{
    if(!isOwner)sb.from("tasks").update({read_by_assignee:true}).eq("id",task.id).then(()=>{});
    sb.from("comments").select("*").eq("task_id",task.id).order("created_at").then(({data})=>setComments(data||[]));
    sb.from("bitacora").select("*").eq("task_id",task.id).order("created_at",{ascending:false}).then(({data})=>setBitacora(data||[]));
    sb.from("tasks").select("*").eq("parent_id",task.id).then(({data})=>setSubtasks(data||[]));
    const ch=sb.channel("cmt-"+task.id).on("postgres_changes",{event:"INSERT",schema:"public",table:"comments",filter:"task_id=eq."+task.id},p=>setComments(prev=>[...prev,p.new])).subscribe();
    return()=>sb.removeChannel(ch);
  },[task.id]);

  const sendCmt=async()=>{
    if(!newCmt.trim())return;
    setLoadingCmt(true);
    const text=newCmt.trim();
  
    await sb.from("comments").insert({
      task_id:task.id,
      user_id:profile.id,
      content:text
    });
  
    setNewCmt("");
    setMention({open:false,query:"",start:-1,active:0});
  
    const idsFromRich=[...text.matchAll(/@\[[^\]]+\]\((u_[^)]+)\)/g)].map(x=>x[1]);
    const tagsPlain=[...text.matchAll(/@\[[^\]]+\]/g)].map(x=>x[0].slice(1,-1));
    const notified=new Set();
  
    for(const n of [...idsFromRich,...tagsPlain]){
      const byId=Object.values(allProfiles).find(p=>("u_"+p.id)===n);
      const byName=Object.values(allProfiles).find(
        p=>norm(p.nombre)===norm(n)||norm(p.apellido)===norm(n)
      );
      const t=byId||byName;
    
      if(t?.telegram_chat_id&&!notified.has(t.id)){
        notified.add(t.id);
        await tgSend(t.telegram_chat_id,'💬 Mencionado en '+task.folio+': "'+text+'"');
      }
    }
  
    setLoadingCmt(false);
  };

  const applyStatus=async ns=>{
    setConfirm(null);
    const u={status:ns};
    if(ns==="en_curso"&&!task.started_at)u.started_at=new Date().toISOString();
    if(ns==="lista")u.completed_at=new Date().toISOString();
    const{error}=await sb.from("tasks").update(u).eq("id",task.id);
    if(error){toast(error.message,"error");return;}
    await sb.from("bitacora").insert({task_id:task.id,user_id:profile.id,action:"→",detail:STATUS[ns]?.label});
    toast("→ "+STATUS[ns]?.label,"success");onSaved();
  };

  // FIX 5: block_on_subtasks — usa subtasks ya cargados en state (se cargan en useEffect al abrir)
  const handleAction=async opt=>{
    if(opt==="archivar"){await sb.from("tasks").update({archived:true}).eq("id",task.id);toast("Archivada","success");onSaved();onClose();return;}
    if(opt==="desarchivar"){await sb.from("tasks").update({archived:false}).eq("id",task.id);toast("Desarchivada","success");onSaved();onClose();return;}
    if(task.block_on_subtasks&&opt==="lista"){
      const inc=subtasks.filter(s=>s.status!=="lista"&&s.status!=="descartada");
      if(inc.length){
        setConfirm({ns:opt,warn:"⚠️ "+inc.length+" subtarea(s) sin completar. ¿Marcar Lista de todas formas?"});
        return;
      }
    }
    await applyStatus(opt);
  };

  const deleteTask=async()=>{
    if(!canEdit)return;
    const{id:_id,folio:_folio,...rest}=task;
    await sb.from("tasks").delete().eq("id",task.id);
    onSaved();onClose();
    toast("Eliminada","info",async()=>{
      await sb.from("tasks").insert(rest);
      onSaved();
      toast("Restaurada","success");
    });
  };

  const ns=NEXT[task.status],owner=allProfiles[task.owner_id],dotsOpts=task.archived?["desarchivar"]:DOTS_OPTS[task.status]||[];

  return <div className="overlay" onClick={onClose}><div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
    <div className="modal-header">
      <div className="flex col gap4 grow">
        <div className="flex center gap8"><span className="muted t-xs" style={{fontFamily:"monospace"}}>{task.folio}</span>{task.is_pinned&&<span>📌</span>}{task.archived&&<span className="badge badge-gray t-xs">Archivada</span>}</div>
        <div className="modal-title">{task.title}</div>
      </div>
      <button className="modal-close" onClick={onClose}>✕</button>
    </div>
    <div className="flex wrap gap8 center" style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
      <span className={"badge "+STATUS[task.status]?.badge} style={{fontSize:12,padding:"4px 12px"}}>● {STATUS[task.status]?.label}</span>
      {ns&&!task.archived&&<button className="btn-secondary btn-sm" onClick={()=>handleAction(ns)}>→ {STATUS[ns]?.label}</button>}
      <div style={{marginLeft:"auto"}} className="flex gap6 center wrap">
        <a href={gcalUrl(task)} target="_blank" rel="noreferrer" className="btn-ghost btn-sm" style={{textDecoration:"none"}}>📅 Agendar</a>
        {canEdit&&<button className="btn-ghost btn-sm" onClick={()=>{onClose();onEdit(task);}}>✏️</button>}
        <button className="btn-ghost btn-sm" onClick={()=>{onClose();onShare(task);}}>↗️</button>
        {canEdit&&<button className="btn-ghost btn-sm red" onClick={deleteTask}>🗑</button>}
        {dotsOpts.length>0&&<select style={{maxWidth:130,padding:"5px 8px",fontSize:12,cursor:"pointer"}} onChange={e=>{if(e.target.value){handleAction(e.target.value);e.target.value="";}}}>
          <option value="">⋮ Más</option>{dotsOpts.map(o=><option key={o} value={o}>{o==="archivar"?"📦 Archivar":o==="desarchivar"?"📤 Desarchivar":STATUS[o]?"→ "+STATUS[o].label:o}</option>)}
        </select>}
      </div>
    </div>
    {confirm&&<div className="card" style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",marginBottom:12}}>
      <div style={{marginBottom:10,fontWeight:600}}>{confirm.warn}</div>
      <div className="flex gap8"><button className="btn-danger btn-sm" onClick={()=>applyStatus(confirm.ns)}>Sí, marcar Lista</button><button className="btn-secondary btn-sm" onClick={()=>setConfirm(null)}>Cancelar</button></div>
    </div>}
    <div className="flex gap4" style={{borderBottom:"1px solid var(--border)",marginBottom:16}}>
      {["detail","comments","bitacora"].map(t=><button key={t} className={"nav-tab"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t==="detail"?"📋 Detalle":t==="comments"?"💬 Comentarios ("+comments.length+")":"📜 Bitácora ("+bitacora.length+")"}</button>)}
    </div>
    {tab==="detail"&&<div className="flex col gap16">
      <div className="flex gap16 wrap">
        <div className="grow"><div className="detail-label">Descripción</div><div style={{whiteSpace:"pre-wrap",lineHeight:1.6}}>{task.description||<span className="muted">Sin descripción</span>}</div></div>
        <div className="flex col gap10" style={{minWidth:180}}>
          <div><div className="detail-label">Dueño</div><div className="flex center gap8"><div className="avatar" style={{width:22,height:22,fontSize:9}}>{initials(owner)}</div><span className="t-sm">{owner?.nombre} {owner?.apellido}</span></div></div>
          {task.due_date&&<div><div className="detail-label">Fecha límite</div><div className={"t-sm "+dueCls(task.due_date)}>📅 {fmt(task.due_date)}</div></div>}
          {task.category&&<div><div className="detail-label">Categoría</div><span className="badge badge-gray">{task.category}</span></div>}
          {(task.tags||[]).length>0&&<div><div className="detail-label">Tags</div><div className="flex wrap gap4">{task.tags.map(t=><span key={t} className="tag">#{t}</span>)}</div></div>}
          {task._isShared&&<div><div className="detail-label">Compartido por</div><div className="flex center gap8"><div className="avatar" style={{width:22,height:22,fontSize:9}}>{initials(allProfiles[task._sharedBy])}</div><span className="t-sm">{allProfiles[task._sharedBy]?.nombre} {allProfiles[task._sharedBy]?.apellido}</span></div></div>}
          {task.is_subtask&&task.parent_id&&<div><div className="detail-label">Asignado por</div><div className="flex center gap8"><div className="avatar" style={{width:22,height:22,fontSize:9}}>{initials(allProfiles[task._assignedBy])}</div><span className="t-sm">{allProfiles[task._assignedBy]?.nombre} {allProfiles[task._assignedBy]?.apellido}</span></div></div>}  
          {isGer&&task.started_at&&<div><div className="detail-label">Inicio</div><div className="t-xs muted">{fmtFull(task.started_at)}</div></div>}
          {isGer&&task.completed_at&&<div><div className="detail-label">Completada</div><div className="t-xs muted">{fmtFull(task.completed_at)}</div></div>}
        </div>
      </div>
      {subtasks.length>0&&<div><div className="detail-label" style={{marginBottom:8}}>Subtareas ({subtasks.length})</div>
        {subtasks.map(st=>{const stO=allProfiles[st.owner_id];return <div key={st.id} className={"subtask-item"+(st.status==="descartada"?" cancelled":"")}>
          <div className="status-dot" style={{background:sColor(st.status)}}/><div className="grow"><div className="t-sm bold">{st.title}</div><div className="flex gap6 center t-xs muted"><span>{stO?.nombre}</span>{st.due_date&&<span className={dueCls(st.due_date)}>{fmt(st.due_date)}</span>}<span className={"badge "+STATUS[st.status]?.badge} style={{fontSize:10}}>{STATUS[st.status]?.label}</span></div></div>
          {isGer&&st.status!=="descartada"&&st.status!=="lista"&&<button className="btn-icon t-xs" onClick={async()=>{await sb.from("tasks").update({status:"descartada"}).eq("id",st.id);setSubtasks(p=>p.map(s=>s.id===st.id?{...s,status:"descartada"}:s));toast("Cancelada","success");onSaved();}}>✕</button>}
        </div>;})}
      </div>}
    </div>}
    {tab==="comments"&&<div className="flex col gap16">
      <div className="flex col gap12">
        {comments.length===0&&<div className="muted t-sm">Sin comentarios.</div>}
        {comments.map(c=>{
          const cp=allProfiles[c.user_id];
          return <div key={c.id} className="comment-item">
            <div className="comment-avatar">{initials(cp)}</div>
            <div>
              <div className="flex center gap8 t-sm" style={{marginBottom:2}}>
                <span className="bold">{cp?.nombre}</span>
                <span className="muted t-xs">{fmtFull(c.created_at)}</span>
              </div>
              <div style={{fontSize:13,lineHeight:1.5}}>
              {c.content
                .replace(/@\[[^\]]+\]\((u_[^)]+)\)/g,(m,uid)=>{
                  const id=uid.slice(2);
                  const up=allProfiles[id];
                  const full=up?((up.nombre||"")+" "+(up.apellido||"")).trim():"";
                  return full?("@"+full):m;
                })
                .split(/(@[^\s@]+)/g)
                .map((p,i)=>p.startsWith("@")?<span key={i} className="comment-mention">{p}</span>:p)
              }
              </div>
            </div>
          </div>;
        })}
      </div>
      <div style={{position:"relative"}}>
  <textarea
    value={newCmt}
    onChange={e=>{
      const v=e.target.value;
      setNewCmt(v);
      updateMentionState(v,e.target.selectionStart||v.length);
    }}
    placeholder="Comentario... @menciona"
    onKeyDown={e=>{
      if(mention.open&&mentionList.length){
        if(e.key==="ArrowDown"){e.preventDefault();setMention(m=>({...m,active:Math.min(m.active+1,mentionList.length-1)}));return;}
        if(e.key==="ArrowUp"){e.preventDefault();setMention(m=>({...m,active:Math.max(m.active-1,0)}));return;}
        if(e.key==="Enter"&&!e.ctrlKey){e.preventDefault();insertMention(mentionList[mention.active]||mentionList[0]);return;}
        if(e.key==="Escape"){e.preventDefault();setMention({open:false,query:"",start:-1,active:0});return;}
      }
      if(e.key==="Enter"&&e.ctrlKey)sendCmt();
    }}
    style={{minHeight:56}}
  />
  {mention.open&&mentionList.length>0&&(
    <div style={{position:"absolute",left:0,right:0,bottom:"calc(100% + 6px)",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--radius)",maxHeight:180,overflowY:"auto",zIndex:20}}>
      {mentionList.map((p,i)=><button key={p.id} className="btn-ghost" style={{width:"100%",justifyContent:"flex-start",background:i===mention.active?"var(--bg3)":"transparent",borderRadius:0,padding:"8px 10px"}} onMouseDown={e=>e.preventDefault()} onClick={()=>insertMention(p)}>
        @{norm(p.nombre||p.apellido||"usuario")} <span className="muted" style={{marginLeft:6}}>{p._full}</span>
      </button>)}
    </div>
  )}
  <div className="flex end gap8" style={{marginTop:6}}>
    <span className="muted t-xs">Ctrl+Enter</span>
    <button className="btn-primary btn-sm" onClick={sendCmt} disabled={loadingCmt||!newCmt.trim()}>{loadingCmt?<span className="spinner"/>:"Enviar"}</button>
  </div>
</div>
    </div>}
    {tab==="bitacora"&&<div>{bitacora.length===0&&<div className="muted t-sm">Sin registros.</div>}
      {bitacora.map(b=>{const bp=allProfiles[b.user_id];return <div key={b.id} className="bitacora-item"><span style={{flexShrink:0,fontFamily:"monospace",fontSize:11}}>{fmtFull(b.created_at)}</span><span className="flex center gap4"><div className="avatar" style={{width:16,height:16,fontSize:7}}>{initials(bp)}</div><span className="bold">{bp?.nombre}</span><span>{b.action}</span>{b.detail&&<span className="accent">"{b.detail}"</span>}</span></div>;})}
    </div>}
  </div></div>;
}

// ── filas ─────────────────────────────────────────────────────────────────────
function FilasView({tasks,profile,allProfiles,cmtMap,onOpen,onStatusChange,onPin,onAction}){
  const[order,setOrder]=useState(()=>{try{return JSON.parse(localStorage.getItem(FILAS_KEY))||DEF_FILAS;}catch{return DEF_FILAS;}});
  const[collapsed,setCollapsed]=useState({});
  const saveOrder=o=>{setOrder(o);try{localStorage.setItem(FILAS_KEY,JSON.stringify(o));}catch{}};
  const mv=(i,d)=>{const o=[...order];const j=i+d;if(j<0||j>=o.length)return;[o[i],o[j]]=[o[j],o[i]];saveOrder(o);};
  const byStatus=s=>tasks.filter(t=>t.status===s).sort((a,b)=>(b.is_pinned?1:0)-(a.is_pinned?1:0));
  const canPin=t=>t.owner_id===profile.id||profile.role==="admin";
  return <div className="flex col gap8 fade-in">
    <div className="muted t-xs" style={{paddingBottom:4}}>▲▼ para reordenar grupos</div>
    {order.map((st,i)=>{const group=byStatus(st);return <div key={st} className="filas-group">
      <div className="filas-header" onClick={()=>setCollapsed(p=>({...p,[st]:!p[st]}))}>
        <span style={{color:sColor(st)}}>{ST_ICON[st]}</span>
        <span className="bold t-sm" style={{color:sColor(st)}}>{STATUS[st]?.label}</span>
        <span className="badge badge-gray t-xs">{group.length}</span>
        <span style={{fontSize:11,color:"var(--text2)",marginLeft:4}}>{collapsed[st]?"▶":"▼"}</span>
        <div style={{marginLeft:"auto"}} className="flex gap4" onClick={e=>e.stopPropagation()}>
          <button className="btn-icon btn-xs" onClick={()=>mv(i,-1)} disabled={i===0}>▲</button>
          <button className="btn-icon btn-xs" onClick={()=>mv(i,1)} disabled={i===order.length-1}>▼</button>
        </div>
      </div>
      {!collapsed[st]&&<div className="filas-body">
        {group.length===0&&<div className="muted t-sm" style={{padding:"8px 12px"}}>Sin tareas</div>}
        {group.map(t=>{const ns=NEXT[t.status],owner=allProfiles[t.owner_id],cnt=cmtMap?.[t.id]||0;
          return <div key={t.id}
            className="filas-row"
            style={addPinAnim(t,{borderLeftColor:sColor(t.status)})}
            onClick={()=>onOpen(t)}>
            <span className="filas-folio">{t.folio||"—"}</span>
            <div className="filas-title"><span className="truncate">{t.title}</span>{t.is_pinned&&<span style={{fontSize:10,flexShrink:0}}>📌</span>}{cnt>0&&<span className="t-xs muted" title={cnt+" comentario(s)"} style={{flexShrink:0}}>💬 {cnt}</span>}</div>
            <div className={"filas-date t-xs "+dueCls(t.due_date)}>{fmt(t.due_date)}</div>
            <div className="filas-cat">{t.category?<span className="badge badge-gray t-xs truncate" style={{maxWidth:"100%"}}>{t.category}</span>:<span className="muted t-xs">—</span>}</div>
            <div className="filas-owner">{owner&&<><div className="avatar" style={{width:18,height:18,fontSize:8}}>{initials(owner)}</div><span className="t-xs muted truncate">{owner.nombre}</span></>}</div>
            <div className="filas-actions" onClick={e=>e.stopPropagation()}>
              {canPin(t)&&<button className={"btn-icon pin-btn"+(t.is_pinned?" active":"")} style={{fontSize:11}} onClick={()=>onPin(t)}>📌</button>}
              {ns&&!t.archived&&<button className="btn-secondary btn-xs" onClick={()=>onStatusChange(t,ns)}>→ {STATUS[ns]?.label}</button>}
              <DotsMenu task={t} profile={profile} onAction={o=>onAction(t,o)}/>
            </div>
          </div>;
        })}
      </div>}
    </div>;})}
  </div>;
}

// ── board ─────────────────────────────────────────────────────────────────────
function BoardView({tasks,profile,allProfiles,cfg,cmtMap,onTaskOpen,onNewTask,onSaved}){
  const[view,setView]=useState(()=>{try{return localStorage.getItem("uuc-view")||"list";}catch{return"list";}});
  const[ownerF,setOwnerF]=useState("all");
  const[statusF,setStatusF]=useState([]);
  const[catF,setCatF]=useState("");
  const[search,setSearch]=useState("");
  const[archived,setArchived]=useState(false);
  useEffect(()=>{try{localStorage.setItem("uuc-view",view);}catch{}},[view]);
  const togStatus=s=>setStatusF(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const cats=cfg?.categories||DEF_CFG.categories;

  const filtered=useMemo(()=>tasks.filter(t=>{
    if(!archived&&t.archived)return false;
    if(archived&&!t.archived)return false;
    if(ownerF==="mine"&&t.owner_id!==profile.id)return false;
    // FIX 6: "Compartidas" usa el flag _isShared marcado en loadTasks
    if(ownerF==="shared"&&!t._isShared)return false;
    if(statusF.length&&!statusF.includes(t.status))return false;
    if(catF&&t.category!==catF)return false;
    if(search){const q=search.toLowerCase();return t.title?.toLowerCase().includes(q)||t.folio?.toLowerCase().includes(q)||(t.tags||[]).some(g=>g.includes(q));}
    return true;
  }),[tasks,ownerF,statusF,catF,search,archived,profile.id]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{if(a.is_pinned&&!b.is_pinned)return -1;if(!a.is_pinned&&b.is_pinned)return 1;return new Date(b.created_at)-new Date(a.created_at);}),[filtered]);

  const doStatusChange=async(task,ns)=>{
  if(ns==="lista"&&task.block_on_subtasks){
    const{data:subs}=await sb.from("tasks").select("id,status").eq("parent_id",task.id);
    const inc=(subs||[]).filter(s=>s.status!=="lista"&&s.status!=="descartada");
    if(inc.length){toast("⚠️ "+inc.length+" subtarea(s) sin completar. Abre la tarea para confirmar.","error");return;}
  }
  const u={status:ns};if(ns==="en_curso"&&!task.started_at)u.started_at=new Date().toISOString();if(ns==="lista")u.completed_at=new Date().toISOString();
  const{error}=await sb.from("tasks").update(u).eq("id",task.id);
  if(!error){await sb.from("bitacora").insert({task_id:task.id,user_id:profile.id,action:"→",detail:STATUS[ns]?.label});toast("→ "+STATUS[ns]?.label,"success");onSaved();}else toast(error.message,"error");
  };
  const doAction=async(task,opt)=>{
  if(opt==="archivar"){await sb.from("tasks").update({archived:true}).eq("id",task.id);toast("Archivada","success");onSaved();return;}
  if(opt==="desarchivar"){await sb.from("tasks").update({archived:false}).eq("id",task.id);toast("Desarchivada","success");onSaved();return;}
  if(opt==="lista"&&task.block_on_subtasks){
    const{data:subs}=await sb.from("tasks").select("id,status").eq("parent_id",task.id);
    const inc=(subs||[]).filter(s=>s.status!=="lista"&&s.status!=="descartada");
    if(inc.length){toast("⚠️ "+inc.length+" subtarea(s) sin completar. Abre la tarea para confirmar.","error");return;}
  }
  await doStatusChange(task,opt);
  };
  const doPin=async task=>{await sb.from("tasks").update({is_pinned:!task.is_pinned}).eq("id",task.id);onSaved();};
  const byStatus=st=>[...filtered.filter(t=>t.status===st)].sort((a,b)=>(b.is_pinned?1:0)-(a.is_pinned?1:0));
  const cp={profile,allProfiles,cmtMap,onOpen:onTaskOpen,onStatusChange:doStatusChange,onPin:doPin,onAction:doAction};

  return <div className="flex col fade-in">
    <div className="board-header">
      <div className="view-toggle">
        <button className={"view-btn"+(view==="list"?" active":"")} onClick={()=>setView("list")}>☰ Lista</button>
        <button className={"view-btn"+(view==="kanban"?" active":"")} onClick={()=>setView("kanban")}>⊞ Kanban</button>
        <button className={"view-btn"+(view==="filas"?" active":"")} onClick={()=>setView("filas")}>▤ Filas</button>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar..." style={{maxWidth:180,minWidth:80}}/>
      <div className="flex gap6 wrap center">
        {[["all","Todas"],["mine","Mías"],["shared","Compartidas"]].map(([k,l])=>(
          <button key={k} className={"filter-chip"+(ownerF===k?" active":"")}
            style={ownerF===k?{background:"var(--accent)",borderColor:"var(--accent)",color:"#000"}:{}}
            onClick={()=>setOwnerF(k)}>{l}</button>
        ))}
        <button className={"filter-chip"+(archived?" active":"")} style={archived?{background:"var(--accent)",borderColor:"var(--accent)",color:"#000"}:{}} onClick={()=>setArchived(p=>!p)}>📦</button>
      </div>
      {!archived&&<button className="btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={onNewTask}>+ Nueva</button>}
    </div>
    <div className="flex gap6 wrap center" style={{marginBottom:16}}>
      <span className="t-xs muted" style={{flexShrink:0}}>Estado:</span>
      {Object.entries(STATUS).map(([k,v])=>(
        <button key={k} className={"filter-chip"+(statusF.includes(k)?" active":"")}
          style={statusF.includes(k)?{background:v.color+"22",borderColor:v.color,color:v.color}:{}}
          onClick={()=>togStatus(k)}>{ST_ICON[k]} {v.label}</button>
      ))}
      {statusF.length>0&&<button className="btn-ghost btn-xs" onClick={()=>setStatusF([])}>✕</button>}
      <div style={{marginLeft:"auto"}}>
        {catF
          ?<button className="filter-chip" style={{background:"rgba(168,85,247,.2)",borderColor:"var(--purple)",color:"var(--purple)"}} onClick={()=>setCatF("")}>📂 {catF} ✕</button>
          :<select value={catF} onChange={e=>setCatF(e.target.value)} style={{maxWidth:150}}><option value="">Categoría...</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
        }
      </div>
    </div>
    {view==="list"&&<div className="task-list">{sorted.length===0&&<div className="muted t-sm" style={{padding:"32px",textAlign:"center"}}>Sin tareas</div>}{sorted.map(t=><TaskRow key={t.id} task={t} {...cp}/>)}</div>}
    {view==="kanban"&&<div className="board-columns">{Object.keys(STATUS).map(st=>{const col=byStatus(st);return <div key={st} className="board-col"><div className="col-header"><span className="col-title" style={{color:sColor(st)}}>{STATUS[st].label}</span><span className="col-count">{col.length}</span></div>{col.length===0&&<div className="card muted t-sm" style={{textAlign:"center",borderStyle:"dashed",fontSize:12,padding:"12px"}}>—</div>}{col.map(t=><TaskCard key={t.id} task={t} {...cp}/>)}</div>;})}</div>}
    {view==="filas"&&<FilasView tasks={filtered} profile={profile} allProfiles={allProfiles} cmtMap={cmtMap} onOpen={onTaskOpen} onStatusChange={doStatusChange} onPin={doPin} onAction={doAction}/>}
  </div>;
}

// ── dashboard ─────────────────────────────────────────────────────────────────
function DashboardView({tasks,profile,allProfiles}){
  const isGer=profile.role==="gerente"||profile.role==="admin";
  const[active,setActive]=useState(()=>{try{const s=localStorage.getItem(DASH_KEY);return s?JSON.parse(s):DEF_DASH;}catch{return DEF_DASH;}});
  useEffect(()=>{try{localStorage.setItem(DASH_KEY,JSON.stringify(active));}catch{}},[active]);
  const tog=id=>setActive(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  if(!isGer)return <div className="muted">Solo para gerentes y admins.</div>;
  const now=new Date(),weekAgo=new Date(now-7*86400000);
  const T={activas:tasks.filter(t=>!t.archived&&t.status!=="lista"&&t.status!=="descartada").length,en_curso:tasks.filter(t=>t.status==="en_curso").length,vencidas:tasks.filter(t=>t.due_date&&dueCls(t.due_date)==="due-overdue"&&t.status!=="lista").length,bloqueadas:tasks.filter(t=>t.status==="bloqueada").length,completadas:tasks.filter(t=>t.status==="lista").length,total:tasks.length,esta_semana:tasks.filter(t=>new Date(t.created_at)>weekAgo).length,archivadas:tasks.filter(t=>t.archived).length,sin_fecha:tasks.filter(t=>!t.due_date&&t.status!=="lista"&&t.status!=="descartada").length,completadas_hoy:tasks.filter(t=>t.completed_at&&new Date(t.completed_at).toDateString()===now.toDateString()).length,tasa_exito:tasks.length>0?Math.round(tasks.filter(t=>t.status==="lista").length/tasks.length*100):0,replaneadas:tasks.filter(t=>t.is_subtask&&t.status==="descartada").length};
  const byCat={};tasks.forEach(t=>{const c=t.category||"Sin cat";byCat[c]=(byCat[c]||0)+1;});const catE=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const bySt={};Object.keys(STATUS).forEach(k=>{bySt[k]=tasks.filter(t=>t.status===k).length;});
  const byP={};tasks.forEach(t=>{const u=t.owner_id;if(!byP[u])byP[u]={total:0,done:0,overdue:0,active:0,times:[]};byP[u].total++;if(t.status==="lista"){byP[u].done++;if(t.started_at&&t.completed_at)byP[u].times.push((new Date(t.completed_at)-new Date(t.started_at))/3600000);}if(t.status==="en_curso")byP[u].active++;if(t.due_date&&dueCls(t.due_date)==="due-overdue"&&t.status!=="lista")byP[u].overdue++;});
  const pE=Object.entries(byP).sort((a,b)=>b[1].total-a[1].total);
  const allTimes=tasks.filter(t=>t.started_at&&t.completed_at).map(t=>(new Date(t.completed_at)-new Date(t.started_at))/3600000);
  const avgTime=allTimes.length?allTimes.reduce((a,b)=>a+b,0)/allTimes.length:null;
  const pTimes=pE.filter(([,v])=>v.times.length).map(([id,v])=>({id,avg:v.times.reduce((a,b)=>a+b,0)/v.times.length}));
  const fastest=pTimes.length?pTimes.reduce((a,b)=>a.avg<b.avg?a:b):null;const slowest=pTimes.length?pTimes.reduce((a,b)=>a.avg>b.avg?a:b):null;
  const maxLoad=pE.length?pE.reduce((a,b)=>a[1].active>b[1].active?a:b):null;const mostDone=pE.length?pE.reduce((a,b)=>a[1].done>b[1].done?a:b):null;
  const withOverdue=pE.filter(([,v])=>v.overdue>0);const maxC=catE[0]?.[1]||1,maxP=pE[0]?.[1]?.total||1;const p=allProfiles;
  const MC=({value,label,color,sub})=><div className="metric-card"><div className="metric-value" style={{color:color||"var(--text)"}}>{value??0}</div><div className="metric-label">{label}</div>{sub&&<div className="metric-sub">{sub}</div>}</div>;
  const renderM=id=>{switch(id){
    case "activas":return <MC key={id} value={T.activas} label="Activas" color="var(--blue)"/>;
    case "en_curso":return <MC key={id} value={T.en_curso} label="En curso" color="var(--blue)"/>;
    case "vencidas":return <MC key={id} value={T.vencidas} label="Vencidas" color="var(--red)"/>;
    case "bloqueadas":return <MC key={id} value={T.bloqueadas} label="Bloqueadas" color="var(--red)"/>;
    case "completadas":return <MC key={id} value={T.completadas} label="Completadas" color="var(--green)"/>;
    case "total":return <MC key={id} value={T.total} label="Total" color="var(--text2)"/>;
    case "esta_semana":return <MC key={id} value={T.esta_semana} label="Esta semana" color="var(--purple)"/>;
    case "archivadas":return <MC key={id} value={T.archivadas} label="Archivadas" color="var(--text2)"/>;
    case "sin_fecha":return <MC key={id} value={T.sin_fecha} label="Sin fecha" color="var(--orange)"/>;
    case "completadas_hoy":return <MC key={id} value={T.completadas_hoy} label="Hoy" color="var(--green)"/>;
    case "tasa_exito":return <MC key={id} value={T.tasa_exito+"%"} label="Tasa éxito" color={T.tasa_exito>=70?"var(--green)":T.tasa_exito>=40?"var(--accent)":"var(--red)"}/>;
    case "replaneadas":return <MC key={id} value={T.replaneadas} label="Replaneadas" color="var(--orange)"/>;
    case "tiempo_prom":return <MC key={id} value={fmtHrs(avgTime)} label="T. promedio" color="var(--accent)"/>;
    case "mas_rapido":return <MC key={id} value={fastest?p[fastest.id]?.nombre||"—":"—"} label="Más rápido" sub={fastest?fmtHrs(fastest.avg):"—"} color="var(--green)"/>;
    case "mas_lento":return <MC key={id} value={slowest?p[slowest.id]?.nombre||"—":"—"} label="Más lento" sub={slowest?fmtHrs(slowest.avg):"—"} color="var(--red)"/>;
    case "carga_max":return <MC key={id} value={maxLoad?p[maxLoad[0]]?.nombre||"—":"—"} label="Mayor carga" sub={maxLoad?maxLoad[1].active+" activas":"—"} color="var(--orange)"/>;
    case "mas_completa":return <MC key={id} value={mostDone?p[mostDone[0]]?.nombre||"—":"—"} label="Más completa" sub={mostDone?mostDone[1].done+" tareas":"—"} color="var(--green)"/>;
    case "con_vencidas":return <div key={id} className="metric-card metric-wide"><div className="metric-label">Con vencidas</div>{withOverdue.length===0?<div className="muted t-sm" style={{marginTop:8}}>Nadie 🎉</div>:<div className="bar-chart">{withOverdue.map(([uid,v])=><div key={uid} className="bar-row"><span className="bar-label">{p[uid]?.nombre||"?"}</span><div className="bar-track"><div className="bar-fill" style={{width:(T.vencidas>0?(v.overdue/T.vencidas)*100:0)+"%",background:"var(--red)"}}/></div><span className="bar-val">{v.overdue}</span></div>)}</div>}</div>;
    case "por_categoria":return <div key={id} className="metric-card metric-wide"><div className="metric-label">Por categoría</div><div className="bar-chart">{catE.map(([cat,count])=><div key={cat} className="bar-row"><span className="bar-label">{cat}</span><div className="bar-track"><div className="bar-fill" style={{width:((count/maxC)*100)+"%",background:"var(--blue)"}}/></div><span className="bar-val">{count}</span></div>)}</div></div>;
    case "por_estado":return <div key={id} className="metric-card metric-wide"><div className="metric-label">Por estado</div><div className="bar-chart">{Object.entries(bySt).map(([st,c])=><div key={st} className="bar-row"><span className="bar-label">{STATUS[st]?.label}</span><div className="bar-track"><div className="bar-fill" style={{width:(T.total>0?(c/T.total)*100:0)+"%",background:sColor(st)}}/></div><span className="bar-val">{c}</span></div>)}</div></div>;
    case "por_persona":return <div key={id} className="metric-card metric-wide"><div className="metric-label">Por persona</div><div className="bar-chart">{pE.map(([uid,v])=><div key={uid} className="bar-row"><span className="bar-label">{p[uid]?.nombre||"?"}</span><div className="bar-track"><div className="bar-fill" style={{width:((v.total/maxP)*100)+"%",background:"var(--blue)"}}/></div><span className="bar-val">{v.done}/{v.total}</span></div>)}</div></div>;
    default:return null;
  }};
  const groups=[...new Set(ALL_METRICS.map(m=>m.g))];
  return <div className="dash-shell fade-in">
    <div className="dash-sidebar"><div className="bold t-sm" style={{marginBottom:8}}>📊 Métricas</div>{groups.map(g=><div key={g}><div className="dash-group-title">{g}</div>{ALL_METRICS.filter(m=>m.g===g).map(m=><div key={m.id} className="metric-toggle" onClick={()=>tog(m.id)}><span>{m.label}</span><div className={"tog"+(active.includes(m.id)?" on":"")}/></div>)}</div>)}</div>
    <div className="dash-main"><div className="metrics-grid">{active.map(id=>renderM(id))}</div></div>
  </div>;
}

// ── calendar — FIX: lunes como primer día, header "Sem" sin S ─────────────────
function CalendarView({tasks,onTaskClick}){
  const[month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[sel,setSel]=useState(null);
  const prev=()=>setMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
  const next=()=>setMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});
  const today=new Date();
  const byDay={};tasks.forEach(t=>{if(!t.due_date)return;const d=new Date(t.due_date+"T12:00:00");if(d.getFullYear()===month.y&&d.getMonth()===month.m){const k=d.getDate();if(!byDay[k])byDay[k]=[];byDay[k].push(t);}});
  // FIX: primer día de semana = Lunes (1). getDay() da 0=Dom..6=Sáb, ajustar a 1=Lun..7=Dom
  const DAYS_LUN=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const MNS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Sep","Oct","Nov","Dic"];
  const firstOfMonth=new Date(month.y,month.m,1);
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  // Offset: cuántos días vacíos antes del 1 (0=Lun, 1=Mar, ... 6=Dom)
  const rawDay=firstOfMonth.getDay(); // 0=Dom
  const offset=rawDay===0?6:rawDay-1; // convertir a lunes=0

  const weeks=[];let wk=[];
  for(let i=0;i<offset;i++)wk.push(null);
  for(let d=1;d<=daysInMonth;d++){
    wk.push(d);
    if(wk.length===7){weeks.push([...wk]);wk=[];}
  }
  if(wk.length){while(wk.length<7)wk.push(null);weeks.push([...wk]);}

  const selTasks=sel&&byDay[sel]?byDay[sel]:[];

  return <div className="cal-outer fade-in">
    <div className="flex center between">
      <div className="t-xl bold">📅 {MNS[month.m]} {month.y}</div>
      <div className="flex center gap8"><button className="btn-ghost btn-sm" onClick={prev}>‹</button><button className="btn-ghost btn-sm" onClick={next}>›</button></div>
    </div>
    <div className="cal-grid">
      {/* FIX: header "Sem" para la columna de números de semana */}
      <div className="cal-day-hdr">Sem</div>
      {DAYS_LUN.map(d=><div key={d} className="cal-day-hdr">{d}</div>)}
      {weeks.map((row,wi)=>{
        // Número de semana ISO del lunes de esta fila
        const firstDay=row.find(d=>d!=null);
        let wn=null;
        if(firstDay!=null){
          // Encontrar el lunes real de esta fila
          const rowDate=new Date(month.y,month.m,firstDay);
          const dow=rowDate.getDay()===0?7:rowDate.getDay();
          const monday=new Date(rowDate);
          monday.setDate(rowDate.getDate()-(dow-1));
          wn=getISOWeek(monday);
        }
        return <React.Fragment key={wi}>
          <div className="cal-wn">{wn!=null?wn:""}</div>
          {row.map((day,di)=>{
            if(day==null)return <div key={di} className="cal-empty"/>;
            const dt=byDay[day]||[];
            const isToday=today.getDate()===day&&today.getMonth()===month.m&&today.getFullYear()===month.y;
            const hasOv=dt.some(t=>dueCls(t.due_date)==="due-overdue"&&t.status!=="lista");
            return <div key={di}
              className={"cal-cell"+(isToday?" today":"")+(hasOv?" has-ov":"")+(sel===day?" sel":"")}
              onClick={()=>setSel(sel===day?null:day)}>
              <div className={"cal-num"+(isToday?" accent":"")}>{day}</div>
              {dt.slice(0,3).map(t=><div key={t.id} className="cal-chip"
                style={{background:sColor(t.status)+"18",borderLeftColor:sColor(t.status)}}
                onClick={e=>{e.stopPropagation();onTaskClick(t);}}
                title={t.title}>{t.title}</div>)}
              {dt.length>3&&<div className="cal-more">+{dt.length-3} más</div>}
            </div>;
          })}
        </React.Fragment>;
      })}
    </div>
    {sel&&selTasks.length>0&&<div className="cal-expanded fade-in">
      <div className="flex between center" style={{marginBottom:12}}>
        <div className="bold">📅 {sel} de {MNS[month.m]}, {month.y} — {selTasks.length} tarea(s)</div>
        <button className="btn-icon" onClick={()=>setSel(null)}>✕</button>
      </div>
      <div className="flex col gap6">{selTasks.map(t=><div key={t.id} className="filas-row" style={{borderLeftColor:sColor(t.status)}} onClick={()=>onTaskClick(t)}>
        <span className="filas-folio">{t.folio||"—"}</span>
        <div className="filas-title truncate">{t.title}</div>
        <span className={"badge "+STATUS[t.status]?.badge} style={{fontSize:11,flexShrink:0}}>{ST_ICON[t.status]} {STATUS[t.status]?.label}</span>
        <a href={gcalUrl(t)} target="_blank" rel="noreferrer" className="btn-ghost btn-xs" style={{textDecoration:"none",flexShrink:0}} onClick={e=>e.stopPropagation()}>📅 Agendar</a>
      </div>)}</div>
    </div>}
    {sel&&selTasks.length===0&&<div className="muted t-sm" style={{textAlign:"center",padding:"12px 0"}}>Sin tareas ese día.</div>}
  </div>;
}

function AnnouncementsModal({profile,allProfiles,onClose}){
  const[msg,setMsg]=useState("");const[loading,setLoading]=useState(false);
  const canSend=profile.role==="admin"||profile.role==="gerente";
  const send=async()=>{if(!msg.trim())return;setLoading(true);await sb.from("announcements").insert({content:msg,active:true,created_by:profile.id});const myR=ROLE_RANK[profile.role]||1;const recipients=Object.values(allProfiles).filter(p=>{if(p.id===profile.id)return false;if(profile.role==="admin")return true;return(ROLE_RANK[p.role]||1)<myR;});for(const r of recipients)if(r.telegram_chat_id)await tgSend(r.telegram_chat_id,"📢 <b>Anuncio de "+profile.nombre+"</b>\n\n"+msg);toast("Enviado a "+recipients.length+" personas","success");setMsg("");setLoading(false);onClose();};
  return <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-header"><span className="modal-title">📢 Nuevo anuncio</span><button className="modal-close" onClick={onClose}>✕</button></div>
    {canSend?<div className="flex col gap12">
      <div style={{background:"rgba(234,179,8,.08)",border:"1px solid rgba(234,179,8,.2)",borderRadius:"var(--radius)",padding:"8px 12px"}} className="t-xs muted">{profile.role==="admin"?"→ Todos los usuarios":"→ Tus subordinados"}</div>
      <div className="field"><label>Mensaje</label><textarea value={msg} onChange={e=>setMsg(e.target.value)} style={{minHeight:100}}/></div>
      <div className="flex gap8 end"><button className="btn-secondary" onClick={onClose}>Cancelar</button><button className="btn-primary" onClick={send} disabled={loading||!msg.trim()}>{loading?<span className="spinner"/>:"📤 Publicar"}</button></div>
    </div>:<div className="muted t-sm">Sin permisos.</div>}
  </div></div>;
}
function CatConfigModal({cfg,profile,onClose,onSaved}){
  const[cats,setCats]=useState([...(cfg?.categories||DEF_CFG.categories)]);
  const[newCat,setNewCat]=useState("");
  const[loading,setLoading]=useState(false);
  const add=()=>{const t=newCat.trim();if(t&&!cats.includes(t)){setCats(p=>[...p,t]);}setNewCat("");};
  const remove=c=>setCats(p=>p.filter(x=>x!==c));
  const save = async () => {
    setLoading(true);
    const newCfg = { ...cfg, categories: cats };
  
    const { error } = await sb
      .from("user_config")
      .upsert(
        { user_id: profile.id, categories: cats },
        { onConflict: "user_id" }
      );
  
    setLoading(false);
  
    if (error) {
      toast("Error al guardar: " + error.message, "error");
      return;
    }
  
    toast("Categorías guardadas", "success");
    onSaved(newCfg);
    onClose();
  };
  return <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-header"><span className="modal-title">⚙️ Categorías</span><button className="modal-close" onClick={onClose}>✕</button></div>
    <div className="flex col gap12">
      <div className="flex wrap gap6" style={{marginBottom:4}}>
        {cats.map(c=><span key={c} className="tag" style={{fontSize:12,padding:"3px 10px"}}>
          {c}<span className="tag-remove" onClick={()=>remove(c)}>✕</span>
        </span>)}
      </div>
      <div className="flex gap8">
        <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nueva categoría..."
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();add();}}}/>
        <button className="btn-secondary btn-sm" style={{flexShrink:0}} onClick={add}>+</button>
      </div>
      <div className="flex gap8 end">
        <button className="btn-secondary" onClick={onClose}>Cancelar</button>
        <button className="btn-primary" onClick={save} disabled={loading}>{loading?<span className="spinner"/>:"Guardar"}</button>
      </div>
    </div>
  </div></div>;
}
// ── app root ──────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);const[profile,setProfile]=useState(null);const[allProfiles,setAllProfiles]=useState({});const[tasks,setTasks]=useState([]);const[cmtMap,setCmtMap]=useState({});const[cfg,setCfg]=useState(DEF_CFG);const[ann,setAnn]=useState(null);const[annDismissed,setAnnDismissed]=useState(false);const[loading,setLoading]=useState(true);const[tab,setTab]=useState("board");const[showProfile,setShowProfile]=useState(false);const[showEditP,setShowEditP]=useState(false);const[showAnn,setShowAnn]=useState(false);const[detailTask,setDetailTask]=useState(null);const[editTask,setEditTask]=useState(null);const[shareTask,setShareTask]=useState(null);
  const[showCatCfg,setShowCatCfg]=useState(false);
  const profRef=useRef(null);

  useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{setSession(session);if(!session)setLoading(false);});const{data:{subscription}}=sb.auth.onAuthStateChange((_e,s)=>{setSession(s);if(!s){setProfile(null);setLoading(false);}});return()=>subscription.unsubscribe();},[]);
  useEffect(()=>{if(session?.user?.id)loadProfile();},[session?.user?.id]);
  const loadProfile=async()=>{const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(data);profRef.current=data;setLoading(false);};
  useEffect(()=>{if(!profile)return;sb.from("profiles").select("*").then(({data})=>{const m={};(data||[]).forEach(p=>{m[p.id]=p;});setAllProfiles(m);});},[profile?.id]);

  useEffect(()=>{
    if(!profile)return;
    sb.from("user_config").select("categories").eq("user_id", profile.id).maybeSingle().then(({ data }) => {
    if (data?.categories) {
      setCfg(prev => ({ ...prev, categories: data.categories }));
    }
  });
    sb.from("announcements").select("*").eq("active",true).order("created_at",{ascending:false}).limit(1).then(({data})=>{if(data?.[0]){setAnn(data[0].content);setAnnDismissed(false);}});
    const ch = sb.channel("ann-rt")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "announcements" },
    ({ new: n }) => { if (n?.content) { setAnn(n.content); setAnnDismissed(false); } }
  )
  .subscribe();
    return()=>sb.removeChannel(ch);
  },[profile?.id]);

  useEffect(()=>{if(!profile)return;loadTasks();const ch=sb.channel("tasks-rt").on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>loadTasks()).subscribe();return()=>sb.removeChannel(ch);},[profile?.id]);

  const loadTasks=async()=>{
    const pid=profRef.current?.id;if(!pid)return;
    const{data:own}=await sb.from("tasks").select("*").eq("owner_id",pid).order("created_at",{ascending:false});
    const{data:shares}=await sb.from("task_shares").select("task_id,shared_by").eq("shared_with",pid);
    let shared=[];
    if(shares?.length){
      const ids=[...new Set(shares.map(s=>s.task_id))];
      const{data}=await sb.from("tasks").select("*").in("id",ids);
      // FIX 6: marcar con _isShared para que el filtro "Compartidas" funcione correctamente
      // sin cambiar el owner_id de la tarea original
      const sharedByMap={};shares.forEach(s=>{sharedByMap[s.task_id]=s.shared_by;});
      shared=(data||[]).map(t=>({...t,_isShared:true,_sharedBy:sharedByMap[t.id]}));
    }
    const all=[...(own||[]),...shared].filter((t,i,a)=>a.findIndex(x=>x.id===t.id)===i);
    setTasks(all);
    if(all.length){
      const ids=all.map(t=>t.id);
      const{data:cmts}=await sb.from("comments").select("task_id").in("task_id",ids);
      const map={};(cmts||[]).forEach(c=>{map[c.task_id]=(map[c.task_id]||0)+1;});
      setCmtMap(map);
    }
  };

  const logout=async()=>{await sb.auth.signOut();setSession(null);setProfile(null);};
  const Sp=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)"}}><div className="spinner spinner-lg"/></div>;

  if(loading)return <Sp/>;
  if(!session)return <AuthScreen/>;
  if(profile&&!profile.onboarding_done)return <OnboardingScreen user={session.user} onDone={loadProfile}/>;
  if(cfg.maintenance&&profile?.role!=="admin")return <MaintenanceScreen msg={cfg.maintenance_msg} isAdmin={false}/>;
  if(!profile)return <Sp/>;

  const showBanner=ann&&!annDismissed;
  return <div className="app-shell">
    {cfg.maintenance&&profile.role==="admin"&&<MaintenanceScreen msg={cfg.maintenance_msg} isAdmin onDisable={async()=>{const c={...cfg,maintenance:false};await sb.from("app_config").upsert({key:CKEY,value:c});setCfg(c);}}/>}
    <div className="topbar">
      <div className="topbar-logo">👾 <span>Task</span></div>
      <div className="flex center gap4">
        {[["board","📋","Tareas"],["dashboard","📊","Dashboard"],["calendar","📅","Calendario"]].map(([k,ic,lb])=>(
          <button key={k} className={"nav-tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{ic} <span>{lb}</span></button>
        ))}
      </div>
      <div className="flex center gap8">
        {(profile.role==="admin"||profile.role==="gerente")&&<button className="btn-ghost btn-sm" onClick={()=>setShowAnn(true)}>📢</button>}
        <button className="btn-ghost btn-sm" onClick={()=>setShowCatCfg(true)}>⚙️</button>
        <div className="avatar" onClick={()=>setShowProfile(true)}>{initials(profile)}</div>
      </div>
    </div>
    {showBanner&&<div className="ann-banner">
      <span style={{fontSize:20,flexShrink:0}}>📢</span>
      <span style={{flex:1,fontSize:13}}><strong>Anuncio: </strong>{ann}</span>
      <button className="ann-accept" onClick={()=>setAnnDismissed(true)}>Aceptar</button>
    </div>}
    <div className="main-content">
      {tab==="board"&&<BoardView tasks={tasks} profile={profile} allProfiles={allProfiles} cfg={cfg} cmtMap={cmtMap} onTaskOpen={setDetailTask} onNewTask={()=>setEditTask({})} onSaved={loadTasks}/>}
      {tab==="dashboard"&&<DashboardView tasks={tasks} profile={profile} allProfiles={allProfiles}/>}
      {tab==="calendar"&&<CalendarView tasks={tasks} onTaskClick={setDetailTask}/>}
    </div>
    {detailTask&&<TaskDetailModal task={detailTask} profile={profile} allProfiles={allProfiles} onClose={()=>setDetailTask(null)} onSaved={()=>{loadTasks();setDetailTask(null);}} onEdit={t=>{setDetailTask(null);setEditTask(t);}} onShare={t=>{setDetailTask(null);setShareTask(t);}}/>}
    {editTask!==null&&<TaskFormModal task={Object.keys(editTask).length===0?null:editTask} profile={profile} allProfiles={allProfiles} cfg={cfg} onClose={()=>setEditTask(null)} onSaved={loadTasks}/>}
    {shareTask&&<ShareModal task={shareTask} profile={profile} allProfiles={allProfiles} onClose={()=>setShareTask(null)} onSaved={loadTasks}/>}
    {showProfile&&<ProfileMenu profile={profile} onClose={()=>setShowProfile(false)} onLogout={logout} onEdit={()=>setShowEditP(true)}/>}
    {showEditP&&<EditProfileModal profile={profile} onClose={()=>setShowEditP(false)} onSaved={u=>setProfile(p=>({...p,...u}))}/>}
    {showAnn&&<AnnouncementsModal profile={profile} allProfiles={allProfiles} onClose={()=>setShowAnn(false)}/>}
    {showCatCfg&&<CatConfigModal cfg={cfg} profile={profile} onClose={()=>setShowCatCfg(false)} onSaved={newCfg=>setCfg(newCfg)}/>}
    <ToastContainer/>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
