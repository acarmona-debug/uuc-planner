<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Tareas — UUC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- CDN stack — no build step needed -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { createClient } = supabase;

    // ── ⚙️  CONFIG — edita aquí si cambias de proyecto ─────────────────────
    const SB_URL = "https://gkjrcwjvbxvjwkdbywde.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdranJjd2p2Ynh2andrZGJ5d2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDA1MDAsImV4cCI6MjA4OTY3NjUwMH0.FD05kgJO97HkOG6whY-NavcN6NlcT5LHC-Cw-PJtuwI";
    // ────────────────────────────────────────────────────────────────────────

    const sb   = createClient(SB_URL, SB_KEY);
    const CKEY = "uuc-cfg-v1";

    const DEF_CFG = {
      categories: ["Compras","Documentación","VBA / Excel","Administración","Moldes UUC","Reunión","Seguimiento","General"],
      priorities:  ["Alta","Media","Baja"],
      statuses:    ["Pendiente","En curso","Bloqueada","Lista"],
    };

    const PCOLS = ["#ef4444","#f59e0b","#22c55e","#a78bfa"];
    const SCOLS = ["#94a3b8","#3b82f6","#f97316","#10b981"];
    const pc    = (p,l) => PCOLS[Math.max(0,l.indexOf(p)) % PCOLS.length];
    const sc    = (s,l) => SCOLS[Math.max(0,l.indexOf(s)) % SCOLS.length];
    const today = ()    => new Date().toISOString().split("T")[0];
    const fmt   = d     => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/,"$3/$2") : "";

    // ── helpers de UI ──────────────────────────────────────────────────────
    const Btn  = ({children,on,onClick,style={}}) =>
      <button style={on?{...S.tOn,...style}:{...S.tab,...style}} onClick={onClick}>{children}</button>;
    const Chip = ({bg,c,children}) =>
      <span style={{background:bg,color:c,fontSize:11,padding:"2px 7px",borderRadius:99,fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>;
    const Lbl  = ({children}) =>
      <label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:3,marginTop:9}}>{children}</label>;
    const Modal = ({children,onClose}) => (
      <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose?.()}>
        <div style={S.modal}>{children}</div>
      </div>
    );

    // ══════════════════════════════════════════════════════════════════════
    //  APP
    // ══════════════════════════════════════════════════════════════════════
    function App() {
      const [tasks,   setTasks]   = useState([]);
      const [cfg,     setCfg]     = useState(() => {
        try { return JSON.parse(localStorage.getItem(CKEY)) || DEF_CFG; } catch { return DEF_CFG; }
      });
      const [view,    setView]    = useState("board");
      const [form,    setForm]    = useState(null);
      const [editId,  setEditId]  = useState(null);
      const [filter,  setFilter]  = useState({status:"all",priority:"all",category:"all"});
      const [search,  setSearch]  = useState("");
      const [flash,   setFlash]   = useState({msg:"",ok:true});
      const [loading, setLoading] = useState(true);

      // ── load ─────────────────────────────────────────────────────────
      useEffect(() => {
        (async () => {
          const { data, error } = await sb.from("tasks").select("*").order("id",{ascending:false});
          if (!error && data) setTasks(data);
          else if (error) notify("⚠ Error cargando: "+error.message, false);
          setLoading(false);
        })();
      }, []);

      const notify = (msg, ok=true) => {
        setFlash({msg,ok});
        setTimeout(() => setFlash({msg:"",ok:true}), 2500);
      };

      // ── CRUD ─────────────────────────────────────────────────────────
      const createTask = async (f) => {
        const { data, error } = await sb.from("tasks").insert({
          title:    f.title.trim(),
          notes:    f.notes || "",
          category: f.category,
          priority: f.priority,
          status:   f.status,
          due:      f.due || null,
          created:  today(),
        }).select().single();
        if (!error && data) { setTasks(p => [data,...p]); notify("✓ Tarea creada"); }
        else notify("⚠ Error: "+(error?.message||"desconocido"), false);
      };

      const updateTask = async (id, changes) => {
        const { data, error } = await sb.from("tasks").update(changes).eq("id",id).select().single();
        if (!error && data) { setTasks(p => p.map(t => t.id===id ? data : t)); notify("✓ Guardado"); }
        else notify("⚠ Error al guardar", false);
      };

      const deleteTask = async (id, title) => {
        if (!confirm(`¿Eliminar "${title}"?`)) return;
        const { error } = await sb.from("tasks").delete().eq("id",id);
        if (!error) { setTasks(p => p.filter(t => t.id!==id)); notify("🗑 Eliminada"); }
        else notify("⚠ Error al eliminar", false);
      };

      // ── form helpers ─────────────────────────────────────────────────
      const openNew = () => {
        setForm({
          title:"", notes:"",
          category: cfg.categories.at(-1),
          priority: cfg.priorities[1] ?? cfg.priorities[0],
          status:   cfg.statuses[0],
          due: "",
        });
        setEditId(null);
        setView("new");
      };

      const openEdit = (t) => {
        setForm({ title:t.title, notes:t.notes||"", category:t.category,
                  priority:t.priority, status:t.status, due:t.due||"" });
        setEditId(t.id);
        setView("new");
      };

      const submit = async () => {
        if (!form?.title?.trim()) { notify("⚠ El título es obligatorio", false); return; }
        if (editId) await updateTask(editId, form);
        else        await createTask(form);
        setView("board"); setForm(null); setEditId(null);
      };

      const saveCfg = (c) => { setCfg(c); localStorage.setItem(CKEY, JSON.stringify(c)); };

      // ── filter ────────────────────────────────────────────────────────
      const visible = tasks.filter(t => {
        if (filter.status   !== "all" && t.status   !== filter.status)   return false;
        if (filter.priority !== "all" && t.priority !== filter.priority) return false;
        if (filter.category !== "all" && t.category !== filter.category) return false;
        const q = search.toLowerCase();
        if (q && !t.title.toLowerCase().includes(q) &&
                 !(t.notes||"").toLowerCase().includes(q)) return false;
        return true;
      });

      const hasFilter = search || Object.values(filter).some(v=>v!=="all");
      const clearFilter = () => { setSearch(""); setFilter({status:"all",priority:"all",category:"all"}); };

      // ── render ────────────────────────────────────────────────────────
      const goBoard = () => setView("board");

      return (
        <div style={S.wrap}>

          {/* ── header ── */}
          <div style={S.hdr}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:19,fontWeight:700,color:"#f8fafc",letterSpacing:"-0.3px"}}>
                🗂 UUC Tasks
              </span>
              {flash.msg && (
                <span style={{fontSize:12,fontWeight:600,color:flash.ok?"#22c55e":"#f87171",
                  background:flash.ok?"#14532d33":"#7f1d1d33",padding:"3px 9px",borderRadius:99}}>
                  {flash.msg}
                </span>
              )}
              {loading && <span style={{fontSize:12,color:"#475569"}}>cargando…</span>}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <Btn on={view==="board"} onClick={goBoard}>📋 Board</Btn>
              <Btn on={view==="list"}  onClick={()=>setView("list")}>☰ Lista</Btn>
              <button style={S.bAdd}  onClick={openNew}>+ Nueva</button>
              <button style={S.bIco}  onClick={()=>setView("cal")}>📅</button>
              <button style={S.bIco}  onClick={()=>setView("settings")}>⚙️</button>
            </div>
          </div>

          {/* ── stat chips ── */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {cfg.statuses.map(s => {
              const n = tasks.filter(t=>t.status===s).length;
              return (
                <div key={s} style={S.stat}
                  onClick={()=>setFilter(f=>({...f,status:filter.status===s?"all":s}))}
                  title="Filtrar por este estado">
                  <span style={{fontSize:10,color:sc(s,cfg.statuses),fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>{s}</span>
                  <span style={{fontSize:24,fontWeight:700,color:"#f1f5f9",lineHeight:1.1}}>{n}</span>
                </div>
              );
            })}
            <div style={{...S.stat,cursor:"default"}}>
              <span style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>Total</span>
              <span style={{fontSize:24,fontWeight:700,color:"#f1f5f9",lineHeight:1.1}}>{tasks.length}</span>
            </div>
          </div>

          {/* ── filters ── */}
          <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <input
              style={S.sinp}
              placeholder="🔍 Buscar título o notas…"
              value={search}
              onChange={e=>setSearch(e.target.value)}
            />
            {[
              ["status",   "Estado",    cfg.statuses],
              ["priority", "Prioridad", cfg.priorities],
              ["category", "Categoría", cfg.categories],
            ].map(([k,lbl,opts]) => (
              <select key={k} style={S.sel}
                value={filter[k]}
                onChange={e=>setFilter(f=>({...f,[k]:e.target.value}))}>
                <option value="all">{lbl}: todos</option>
                {opts.map(x=><option key={x} value={x}>{x}</option>)}
              </select>
            ))}
            {hasFilter && (
              <button style={S.bSec} onClick={clearFilter}>✕ limpiar</button>
            )}
            {hasFilter && (
              <span style={{fontSize:12,color:"#475569"}}>
                {visible.length} de {tasks.length}
              </span>
            )}
          </div>

          {/* ── BOARD view ── */}
          {(view==="board"||view==="list"?"board"===view:false) || view==="board" ? (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10}}>
              {cfg.statuses.map(s => {
                const col = visible.filter(t=>t.status===s);
                return (
                  <div key={s} style={S.col}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10,padding:"0 2px"}}>
                      <span style={{width:9,height:9,borderRadius:"50%",background:sc(s,cfg.statuses),flexShrink:0,boxShadow:`0 0 6px ${sc(s,cfg.statuses)}66`}}/>
                      <span style={{fontSize:12,fontWeight:600,color:"#94a3b8",flex:1}}>{s}</span>
                      <span style={{fontSize:11,color:"#475569",background:"#0f172a",borderRadius:99,padding:"1px 8px",fontWeight:600}}>{col.length}</span>
                    </div>
                    {col.length===0
                      ? <div style={S.empty}>vacío</div>
                      : col.map(t=>(
                          <TCard key={t.id} t={t} cfg={cfg}
                            onEdit={()=>openEdit(t)}
                            onDelete={()=>deleteTask(t.id,t.title)}
                            onStatus={ns=>updateTask(t.id,{status:ns})}
                          />
                        ))
                    }
                  </div>
                );
              })}
            </div>
          ) : null}

          {/* ── LIST view ── */}
          {view==="list" && (
            <div>
              {visible.length===0
                ? <div style={{...S.empty,padding:40}}>No hay tareas que coincidan</div>
                : [...visible]
                    .sort((a,b) => cfg.priorities.indexOf(a.priority) - cfg.priorities.indexOf(b.priority))
                    .map(t=>(
                      <TRow key={t.id} t={t} cfg={cfg}
                        onEdit={()=>openEdit(t)}
                        onDelete={()=>deleteTask(t.id,t.title)}
                        onStatus={ns=>updateTask(t.id,{status:ns})}
                      />
                    ))
              }
            </div>
          )}

          {/* ── modal: crear/editar ── */}
          {view==="new" && form && (
            <Modal onClose={goBoard}>
              <h3 style={{margin:"0 0 4px",color:"#f8fafc",fontSize:15}}>
                {editId ? "✏️ Editar tarea" : "➕ Nueva tarea"}
              </h3>
              <p style={{fontSize:11,color:"#475569",marginBottom:4}}>
                {editId ? `ID #${editId}` : "Los campos con * son obligatorios"}
              </p>
              <Lbl>Título *</Lbl>
              <input
                style={S.inp} value={form.title} autoFocus
                placeholder="¿Qué hay que hacer?"
                onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&submit()}
              />
              <Lbl>Notas</Lbl>
              <textarea
                style={{...S.inp,height:60,resize:"vertical"}}
                value={form.notes||""}
                placeholder="Contexto, links, referencias…"
                onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              />
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                {[
                  ["Categoría","category",cfg.categories],
                  ["Prioridad","priority",cfg.priorities],
                  ["Estado",   "status",  cfg.statuses],
                ].map(([lb,k,o])=>(
                  <div key={k}>
                    <Lbl>{lb}</Lbl>
                    <select style={S.inp} value={form[k]||""}
                      onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}>
                      {o.map(x=><option key={x}>{x}</option>)}
                    </select>
                  </div>
                ))}
                <div>
                  <Lbl>Fecha vence</Lbl>
                  <input type="date" style={S.inp} value={form.due||""}
                    onChange={e=>setForm(f=>({...f,due:e.target.value}))}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:16}}>
                <button style={S.bAdd} onClick={submit}>
                  {editId ? "Guardar cambios" : "Crear tarea"}
                </button>
                <button style={S.bSec} onClick={goBoard}>Cancelar</button>
              </div>
            </Modal>
          )}

          {/* ── modal: calendar ── */}
          {view==="cal" && (
            <Modal onClose={goBoard}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <b style={{color:"#f8fafc",fontSize:14}}>📅 Agendar en Google Calendar</b>
                <button style={S.ib} onClick={goBoard}>✕</button>
              </div>
              <CalPicker tasks={tasks} cfg={cfg} onClose={goBoard}/>
            </Modal>
          )}

          {/* ── modal: settings ── */}
          {view==="settings" && (
            <Modal onClose={goBoard}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <b style={{color:"#f8fafc",fontSize:14}}>⚙️ Configuración</b>
                <button style={S.ib} onClick={goBoard}>✕</button>
              </div>
              <p style={{fontSize:11,color:"#475569",marginBottom:10}}>
                Categorías, prioridades y estados se guardan en este navegador.
              </p>
              <CfgEditor cfg={cfg} onSave={c=>{saveCfg(c);goBoard();notify("✓ Configuración guardada");}}/>
            </Modal>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  TASK CARD (board)
    // ══════════════════════════════════════════════════════════════════════
    function TCard({t, cfg, onEdit, onDelete, onStatus}) {
      const [open, setOpen] = useState(false);
      const ref  = useRef(null);
      const overdue = t.due && t.due < today() && t.status !== "Lista";

      useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        if (open) document.addEventListener("mousedown",h);
        return () => document.removeEventListener("mousedown",h);
      }, [open]);

      return (
        <div style={{...S.card,borderLeft:`3px solid ${pc(t.priority,cfg.priorities)}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
            <span style={{flex:1,fontSize:13,color:"#f1f5f9",fontWeight:500,lineHeight:1.4,wordBreak:"break-word"}}>
              {t.title}
            </span>
            <div ref={ref} style={{position:"relative",flexShrink:0}}>
              <button style={S.ib} onClick={()=>setOpen(o=>!o)}>⋯</button>
              {open && (
                <div style={S.dd}>
                  {cfg.statuses.filter(s=>s!==t.status).map(s=>(
                    <button key={s} style={S.ddi} onClick={()=>{onStatus(s);setOpen(false);}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:sc(s,cfg.statuses),flexShrink:0,display:"inline-block"}}/>
                      → {s}
                    </button>
                  ))}
                  <hr style={{border:"none",borderTop:"1px solid #334155",margin:"4px 0"}}/>
                  <button style={S.ddi} onClick={()=>{onEdit();setOpen(false);}}>✏️ Editar</button>
                  <button style={{...S.ddi,color:"#f87171"}} onClick={()=>{onDelete();setOpen(false);}}>🗑️ Eliminar</button>
                </div>
              )}
            </div>
          </div>
          {t.notes && (
            <p style={{fontSize:11,color:"#64748b",marginTop:5,lineHeight:1.5,
              overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
              {t.notes}
            </p>
          )}
          <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
            <Chip bg={pc(t.priority,cfg.priorities)+"22"} c={pc(t.priority,cfg.priorities)}>
              {t.priority}
            </Chip>
            <Chip bg="#0f172a" c="#475569">{t.category}</Chip>
            {t.due && (
              <Chip bg={overdue?"#7f1d1d33":"#1e293b"} c={overdue?"#f87171":"#475569"}>
                📅 {fmt(t.due)}{overdue?" ⚠":""}
              </Chip>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  TASK ROW (list)
    // ══════════════════════════════════════════════════════════════════════
    function TRow({t, cfg, onEdit, onDelete, onStatus}) {
      const [open, setOpen] = useState(false);
      const ref  = useRef(null);
      const overdue = t.due && t.due < today() && t.status !== "Lista";

      useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        if (open) document.addEventListener("mousedown",h);
        return () => document.removeEventListener("mousedown",h);
      }, [open]);

      return (
        <div style={{...S.card,display:"flex",alignItems:"center",gap:10,marginBottom:5,flexWrap:"wrap"}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:sc(t.status,cfg.statuses),flexShrink:0}}/>
          <span style={{flex:1,fontSize:13,color:"#f1f5f9",minWidth:120,wordBreak:"break-word"}}>{t.title}</span>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <Chip bg={pc(t.priority,cfg.priorities)+"22"} c={pc(t.priority,cfg.priorities)}>{t.priority}</Chip>
            <Chip bg={sc(t.status,cfg.statuses)+"22"}   c={sc(t.status,cfg.statuses)}>{t.status}</Chip>
            <Chip bg="#0f172a" c="#475569">{t.category}</Chip>
            {t.due && (
              <Chip bg={overdue?"#7f1d1d33":"#1e293b"} c={overdue?"#f87171":"#475569"}>
                📅 {fmt(t.due)}
              </Chip>
            )}
          </div>
          <div ref={ref} style={{position:"relative",flexShrink:0}}>
            <button style={S.ib} onClick={()=>setOpen(o=>!o)}>⋯</button>
            {open && (
              <div style={{...S.dd,right:0,left:"auto"}}>
                {cfg.statuses.filter(s=>s!==t.status).map(s=>(
                  <button key={s} style={S.ddi} onClick={()=>{onStatus(s);setOpen(false);}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:sc(s,cfg.statuses),flexShrink:0,display:"inline-block"}}/>
                    → {s}
                  </button>
                ))}
                <hr style={{border:"none",borderTop:"1px solid #334155",margin:"4px 0"}}/>
                <button style={S.ddi} onClick={()=>{onEdit();setOpen(false);}}>✏️ Editar</button>
                <button style={{...S.ddi,color:"#f87171"}} onClick={()=>{onDelete();setOpen(false);}}>🗑️ Eliminar</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  CAL PICKER
    // ══════════════════════════════════════════════════════════════════════
    function CalPicker({tasks, cfg, onClose}) {
      const [sel,  setSel]  = useState(null);
      const [date, setDate] = useState(today());
      const t = tasks.find(x=>x.id===sel);

      const go = () => {
        if (!t) return;
        const d    = date.replace(/-/g,"");
        const desc = [
          `Cat: ${t.category}`,
          `Prioridad: ${t.priority}`,
          t.notes ? `Notas: ${t.notes}` : ""
        ].filter(Boolean).join(" | ");
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
          + `&text=${encodeURIComponent(t.title)}`
          + `&dates=${d}T090000/${d}T100000`
          + `&details=${encodeURIComponent(desc)}`;
        window.open(url,"_blank","noopener");
        onClose();
      };

      return (
        <div>
          {tasks.length===0
            ? <p style={{color:"#475569",fontSize:13}}>Crea una tarea primero.</p>
            : <>
                <Lbl>Selecciona una tarea</Lbl>
                <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto",marginBottom:12}}>
                  {tasks.map(x=>(
                    <div key={x.id} onClick={()=>setSel(x.id)} style={{
                      padding:"8px 12px",borderRadius:7,cursor:"pointer",
                      border:`1px solid ${sel===x.id?"#3b82f6":"#334155"}`,
                      background:sel===x.id?"#1e3a5f":"#0f172a",
                      display:"flex",alignItems:"center",gap:10,
                    }}>
                      <span style={{width:8,height:8,borderRadius:"50%",
                        background:sc(x.status,cfg.statuses),flexShrink:0}}/>
                      <span style={{flex:1,color:"#f1f5f9",fontSize:13}}>{x.title}</span>
                      <Chip bg={pc(x.priority,cfg.priorities)+"22"} c={pc(x.priority,cfg.priorities)}>
                        {x.priority}
                      </Chip>
                    </div>
                  ))}
                </div>
                <Lbl>Fecha del evento</Lbl>
                <input type="date" style={{...S.inp,marginBottom:14}} value={date}
                  onChange={e=>setDate(e.target.value)}/>
                {t && (
                  <div style={{background:"#0f172a",borderRadius:7,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#94a3b8",lineHeight:1.5}}>
                    <b style={{color:"#f1f5f9"}}>{t.title}</b><br/>
                    📅 {date} · 09:00–10:00 (editable en Calendar)
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button style={{...S.bCal,opacity:sel?1:0.45}} disabled={!sel} onClick={go}>
                    📅 Abrir en Calendar
                  </button>
                  <button style={S.bSec} onClick={onClose}>Cancelar</button>
                </div>
              </>
          }
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  CFG EDITOR
    // ══════════════════════════════════════════════════════════════════════
    function CfgEditor({cfg, onSave}) {
      const [d,   setD]   = useState(JSON.parse(JSON.stringify(cfg)));
      const [tab, setTab] = useState("categories");
      const tabs = [
        {k:"categories",l:"Categorías"},
        {k:"priorities",l:"Prioridades"},
        {k:"statuses",  l:"Estados"},
      ];
      const add = () => {
        const v = prompt("Nombre:");
        if (v?.trim()) setD(x=>({...x,[tab]:[...x[tab],v.trim()]}));
      };
      const rm = i => setD(x=>({...x,[tab]:x[tab].filter((_,j)=>j!==i)}));
      const rn = i => {
        const v = prompt("Nuevo nombre:", d[tab][i]);
        if (v?.trim()) { const a=[...d[tab]]; a[i]=v.trim(); setD(x=>({...x,[tab]:a})); }
      };
      const mv = (i,dir) => {
        const a=[...d[tab]], j=i+dir;
        if (j<0||j>=a.length) return;
        [a[i],a[j]]=[a[j],a[i]];
        setD(x=>({...x,[tab]:a}));
      };
      return (
        <div>
          <div style={{display:"flex",gap:5,marginBottom:11}}>
            {tabs.map(t=><Btn key={t.k} on={tab===t.k} onClick={()=>setTab(t.k)}>{t.l}</Btn>)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:11,maxHeight:200,overflowY:"auto"}}>
            {d[tab].map((item,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,
                background:"#0f172a",borderRadius:6,padding:"6px 10px"}}>
                <span style={{flex:1,color:"#f1f5f9",fontSize:13}}>{item}</span>
                <button style={S.ib} onClick={()=>rn(i)} title="Renombrar">✏️</button>
                <button style={S.ib} onClick={()=>mv(i,-1)} title="Subir">↑</button>
                <button style={S.ib} onClick={()=>mv(i,1)}  title="Bajar">↓</button>
                <button style={S.ib} onClick={()=>rm(i)}    title="Eliminar">🗑️</button>
              </div>
            ))}
          </div>
          <button style={{...S.bSec,width:"100%",marginBottom:11}} onClick={add}>+ Agregar</button>
          <button style={S.bAdd} onClick={()=>onSave(d)}>💾 Guardar configuración</button>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════
    //  STYLES
    // ══════════════════════════════════════════════════════════════════════
    const S = {
      wrap:  {background:"#0f172a",minHeight:"100vh",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",color:"#f1f5f9",padding:"14px 16px",boxSizing:"border-box",maxWidth:1400,margin:"0 auto"},
      hdr:   {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8},
      stat:  {flex:1,minWidth:75,background:"#1e293b",borderRadius:9,padding:"9px 12px",display:"flex",flexDirection:"column",gap:2,cursor:"pointer",border:"1px solid transparent",transition:"border-color .15s"},
      col:   {background:"#111827",borderRadius:10,padding:"10px 9px",minHeight:80},
      card:  {background:"#1e293b",borderRadius:8,padding:"10px 11px",marginBottom:6,border:"1px solid #334155",transition:"border-color .15s"},
      ib:    {background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"2px 4px",color:"#64748b",borderRadius:4,lineHeight:1},
      empty: {color:"#334155",fontSize:12,textAlign:"center",padding:"18px 0",letterSpacing:"0.5px"},
      tab:   {background:"none",border:"1px solid #334155",color:"#64748b",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12,transition:"all .15s"},
      tOn:   {background:"#1e3a5f",border:"1px solid #3b82f6",color:"#93c5fd",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12},
      bAdd:  {background:"#2563eb",border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:600,fontSize:13},
      bCal:  {background:"#064e3b",border:"1px solid #10b981",color:"#6ee7b7",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontWeight:600,fontSize:13},
      bSec:  {background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:13},
      bIco:  {background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:14},
      sinp:  {background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#f1f5f9",padding:"5px 10px",fontSize:13,flex:1,minWidth:140,outline:"none"},
      sel:   {background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#94a3b8",padding:"5px 8px",fontSize:12,cursor:"pointer",outline:"none"},
      ov:    {position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,backdropFilter:"blur(2px)"},
      modal: {background:"#1e293b",borderRadius:14,padding:22,width:"100%",maxWidth:520,border:"1px solid #334155",maxHeight:"92vh",overflowY:"auto"},
      inp:   {width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:6,color:"#f1f5f9",padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"inherit"},
      dd:    {position:"absolute",top:"100%",right:0,background:"#0f172a",border:"1px solid #334155",borderRadius:9,padding:"6px",zIndex:30,minWidth:150,boxShadow:"0 8px 24px #00000055",marginTop:3},
      ddi:   {display:"flex",alignItems:"center",gap:7,width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:12,padding:"5px 8px",cursor:"pointer",borderRadius:5,textAlign:"left",whiteSpace:"nowrap"},
    };

    // ── mount ──────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
